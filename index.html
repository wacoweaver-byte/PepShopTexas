<script>
(function(){
  const CART_KEY = "pstPendingCheckoutCart";
  const CART_AT_KEY = "pstPendingCheckoutCartSavedAt";
  const MAX_AGE = 1000 * 60 * 60 * 24;

  function getLiveCart(){
    try {
      if (typeof cart !== "undefined" && Array.isArray(cart)) return cart;
    } catch (_) {}
    try {
      if (Array.isArray(window.cart)) return window.cart;
    } catch (_) {}
    return [];
  }

  function setLiveCart(items){
    try {
      if (typeof cart !== "undefined") {
        cart = items;
        window.cart = cart;
        return true;
      }
    } catch (_) {}
    try {
      window.cart = items;
      return true;
    } catch (_) {}
    return false;
  }

  window.pstSaveCartForLoginCheckout = function pstSaveCartForLoginCheckout(){
    try {
      const liveCart = getLiveCart();
      if (!Array.isArray(liveCart) || liveCart.length === 0) {
        console.warn("PST cart preserve skipped: cart empty or unavailable.");
        return false;
      }

      localStorage.setItem(CART_KEY, JSON.stringify(liveCart));
      localStorage.setItem(CART_AT_KEY, String(Date.now()));
      sessionStorage.setItem(CART_KEY, JSON.stringify(liveCart));
      sessionStorage.setItem(CART_AT_KEY, String(Date.now()));
      console.log("PST cart saved for login checkout:", liveCart.length, "item(s)");
      return true;
    } catch (err) {
      console.warn("PST cart preserve failed:", err && err.message ? err.message : err);
      return false;
    }
  };

  window.pstRestoreCartAfterLoginCheckout = function pstRestoreCartAfterLoginCheckout(){
    try {
      const params = new URLSearchParams(window.location.search);
      const shouldRestore = params.get("restoreCart") === "1" || params.get("checkout") === "1" || localStorage.getItem(CART_KEY) || sessionStorage.getItem(CART_KEY);
      if (!shouldRestore) return false;

      const savedAt = Number(localStorage.getItem(CART_AT_KEY) || sessionStorage.getItem(CART_AT_KEY) || 0);
      if (!savedAt || (Date.now() - savedAt) > MAX_AGE) {
        localStorage.removeItem(CART_KEY);
        localStorage.removeItem(CART_AT_KEY);
        sessionStorage.removeItem(CART_KEY);
        sessionStorage.removeItem(CART_AT_KEY);
        return false;
      }

      const raw = localStorage.getItem(CART_KEY) || sessionStorage.getItem(CART_KEY);
      if (!raw) return false;

      const savedCart = JSON.parse(raw);
      if (!Array.isArray(savedCart) || savedCart.length === 0) return false;

      setLiveCart(savedCart);

      if (typeof renderCart === "function") renderCart();

      setTimeout(function(){
        setLiveCart(savedCart);
        if (typeof renderCart === "function") renderCart();

        const panel = document.getElementById("cartPanel");
        if (panel) panel.classList.add("open");

        console.log("PST cart restored after login:", savedCart.length, "item(s)");
      }, 350);

      return true;
    } catch (err) {
      console.warn("PST cart restore failed:", err && err.message ? err.message : err);
      return false;
    }
  };

  window.pstClearPendingCheckoutCart = function pstClearPendingCheckoutCart(){
    try {
      localStorage.removeItem(CART_KEY);
      localStorage.removeItem(CART_AT_KEY);
      sessionStorage.removeItem(CART_KEY);
      sessionStorage.removeItem(CART_AT_KEY);
    } catch (_) {}
  };

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(function(){
      window.pstRestoreCartAfterLoginCheckout();
    }, 500);
  });
})();
</script>


<script>
(function(){
  const CART_KEYS = [
    "pstPendingCheckoutCart",
    "pstPendingCheckoutCartSavedAt",
    "pstPendingReorderCart",
    "pstCart",
    "cart",
    "pepShopCart",
    "pepShopTexasCart"
  ];

  window.pstClearAllCartStorage = function pstClearAllCartStorage(){
    try {
      CART_KEYS.forEach(function(key){
        try { localStorage.removeItem(key); } catch (_) {}
        try { sessionStorage.removeItem(key); } catch (_) {}
      });

      try {
        if (typeof cart !== "undefined") cart = [];
      } catch (_) {}

      try {
        window.cart = [];
      } catch (_) {}

      try {
        if (typeof renderCart === "function") renderCart();
      } catch (_) {}

      return true;
    } catch (err) {
      console.warn("PST cart clear failed:", err && err.message ? err.message : err);
      return false;
    }
  };

  // Keep existing named helper compatible.
  window.pstClearPendingCheckoutCart = function pstClearPendingCheckoutCart(){
    return window.pstClearAllCartStorage();
  };

  // If checkout shows a successful order message, clear stored cart shortly after.
  function watchCheckoutSuccess(){
    var status = document.getElementById("checkoutStatus");
    if (!status) return;

    var text = (status.textContent || "").toLowerCase();
    if (
      text.includes("order saved") ||
      text.includes("order submitted") ||
      text.includes("order placed") ||
      text.includes("thank you")
    ) {
      window.pstClearAllCartStorage();
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    setInterval(watchCheckoutSuccess, 800);

    var logoutCandidates = Array.from(document.querySelectorAll("button,a")).filter(function(el){
      return /logout|log out|sign out/i.test((el.textContent || "").trim()) ||
             /logout|signout|sign-out/i.test(el.id || "");
    });

    logoutCandidates.forEach(function(el){
      if (el.dataset.pstClearCartBound === "true") return;
      el.dataset.pstClearCartBound = "true";
      el.addEventListener("click", function(){
        window.pstClearAllCartStorage();
      }, true);
    });
  });
})();
</script>

<script>
(function(){
  function getOptInBox(){
    var checkbox =
      document.getElementById("marketingOptIn") ||
      document.getElementById("checkoutMarketingOptIn") ||
      document.getElementById("marketingOptInCheckbox") ||
      document.querySelector('input[name="marketing_opt_in"]') ||
      document.querySelector('input[name="checkout_marketing_opt_in"]');

    var box =
      document.getElementById("checkoutMarketingOptInBox") ||
      document.getElementById("marketingOptInBox") ||
      (checkbox && checkbox.closest(".checkout-marketing-optin")) ||
      (checkbox && checkbox.closest(".marketing-optin"));

    return { box: box, checkbox: checkbox };
  }

  function showOptInPrompt(){
    var parts = getOptInBox();
    if (parts.box) {
      parts.box.style.display = "";
      parts.box.setAttribute("data-marketing-preference-status", "unknown");
    }
  }

  function hideOptInPrompt(status){
    var parts = getOptInBox();
    if (parts.checkbox) parts.checkbox.checked = false;
    if (parts.box) {
      parts.box.style.display = "none";
      parts.box.setAttribute("data-marketing-preference-status", status || "known");
    }
  }

  window.pstRefreshCheckoutMarketingPrompt = async function pstRefreshCheckoutMarketingPrompt(){
    try {
      var parts = getOptInBox();
      if (!parts.box) return { skipped:true, reason:"no_prompt" };

      var client = window.pstHomeSupabase || window.supabaseClient || window.supabase;
      if (!client || !client.auth || !client.from) {
        showOptInPrompt();
        return { skipped:true, reason:"no_client" };
      }

      var sessionResult = await client.auth.getSession();
      var session = sessionResult && sessionResult.data ? sessionResult.data.session : null;

      // If not logged in, leave it visible because the customer preference is unknown.
      if (!session || !session.user) {
        showOptInPrompt();
        return { visible:true, reason:"not_logged_in" };
      }

      var result = await client
        .from("customer_profiles")
        .select("marketing_opt_in,marketing_opt_out,marketing_source,marketing_opt_in_at,marketing_opt_out_at")
        .eq("user_id", session.user.id)
        .maybeSingle();

      if (result && result.error) {
        console.warn("Marketing preference lookup skipped:", result.error.message || result.error);
        showOptInPrompt();
        return { visible:true, reason:"lookup_error" };
      }

      var profile = result ? result.data : null;

      if (profile && profile.marketing_opt_in === true) {
        hideOptInPrompt("opted_in");
        return { hidden:true, status:"opted_in" };
      }

      if (profile && profile.marketing_opt_out === true) {
        hideOptInPrompt("opted_out");
        return { hidden:true, status:"opted_out" };
      }

      // Unknown/no prior answer: ask once at checkout.
      showOptInPrompt();
      return { visible:true, status:"unknown" };
    } catch (err) {
      console.warn("Marketing prompt refresh skipped:", err && err.message ? err.message : err);
      showOptInPrompt();
      return { visible:true, reason:"exception" };
    }
  };

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(window.pstRefreshCheckoutMarketingPrompt, 250);
    setTimeout(window.pstRefreshCheckoutMarketingPrompt, 1200);
  });

  document.addEventListener("click", function(e){
    var target = e.target;
    var cartButtonClicked = target && (
      target.closest(".cart-button") ||
      target.closest("[data-cart]") ||
      target.closest("#cartButton") ||
      target.closest("#checkoutButton")
    );
    if (cartButtonClicked) {
      setTimeout(window.pstRefreshCheckoutMarketingPrompt, 150);
      setTimeout(window.pstRefreshCheckoutMarketingPrompt, 900);
    }
  }, true);

  window.addEventListener("focus", function(){
    setTimeout(window.pstRefreshCheckoutMarketingPrompt, 200);
  });
})();
</script>

<script>
/* PST_STACK_BLEND_DETAIL_TITLE_SPLIT_PATCH_V1 */
function pstFormatStackBlendDetailTitleText(rawTitle) {
  const raw = String(rawTitle || "").trim();
  const match = raw.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
  if (!match) return null;

  const main = match[1].trim();
  let components = match[2].trim();

  if (!/\b(stack|blend)\b/i.test(main) && !/[+/]/.test(components)) return null;

  components = components
    .replace(/\s*\/\s*/g, " + ")
    .replace(/\s*\+\s*/g, " + ")
    .replace(/\s+/g, " ")
    .trim();

  if (!main || !components) return null;

  return {
    main,
    components
  };
}

function pstEscapeDetailTitleHtml(value) {
  return String(value || "").replace(/[&<>"']/g, function(char) {
    return ({"&":"&amp;","<":"&lt;",">":"&gt;","\\":"&quot;","'":"&#39;"})[char];
  });
}

function pstApplyStackBlendDetailTitleSplit() {
  const titleEl = document.getElementById("selectedName");
  if (!titleEl) return;

  const original = titleEl.textContent || "";

  const formatted = pstFormatStackBlendDetailTitleText(original);
  if (!formatted) {
    titleEl.textContent = original;
    return;
  }

  titleEl.innerHTML =
    '<span class="pst-detail-title-main">' + pstEscapeDetailTitleHtml(formatted.main) + '</span>' +
    '<span class="pst-detail-title-components">' + pstEscapeDetailTitleHtml(formatted.components) + '</span>';
}

document.addEventListener("DOMContentLoaded", function() {
  document.addEventListener("click", function(event) {
    const possibleProductClick = event.target && event.target.closest
      ? event.target.closest("button, a, .stack-card, .tx-card, .home-mini-product, .peptide-list a")
      : null;

    if (!possibleProductClick) return;

    setTimeout(pstApplyStackBlendDetailTitleSplit, 80);
    setTimeout(pstApplyStackBlendDetailTitleSplit, 220);
  });
});
</script>


<script>
/* PST_STACK_BLEND_TITLE_RESELECT_FIX_V1
   Fixes stale stack/blend detail title reselecting Glow Blend.
   Uses the currently selected product/stack data instead of a saved old title attribute.
*/
(function() {
  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, function(char) {
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\\":"&quot;","'":"&#39;"})[char];
    });
  }

  function normalizeComponents(value) {
    return String(value || "")
      .replace(/\s*\/\s*/g, " + ")
      .replace(/\s*\+\s*/g, " + ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function derivePartsFromName(name, data) {
    const raw = String(name || "").trim();
    const display = raw || String(data && data.display || "").trim();
    const dataContents = normalizeComponents(data && (data.contents || data.components || data.stackContents || data.stack_contents || ""));

    if (/^klow\b/i.test(display)) {
      return { main: "Klow Blend", components: dataContents || "KPV + BPC-157 + TB-500" };
    }

    if (/^wolverine\b/i.test(display)) {
      return { main: "Wolverine Stack", components: dataContents || "BPC-157 + TB-500" };
    }

    if (/^glow\b/i.test(display)) {
      return { main: "Glow Blend", components: dataContents || "BPC-157 + TB4 + GHK-Cu" };
    }

    const match = display.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
    if (match) {
      const main = match[1].trim();
      const components = normalizeComponents(match[2]);
      if (main && components && (/\b(stack|blend)\b/i.test(main) || /[+/]/.test(components))) {
        return { main, components };
      }
    }

    if (dataContents && /\b(stack|blend)\b/i.test(display)) {
      return { main: display, components: dataContents };
    }

    return null;
  }

  window.pstSetDetailTitle = function(data) {
    const titleEl = document.getElementById("selectedName");
    if (!titleEl) return;

    const display = String(data && data.display || "").trim();
    titleEl.removeAttribute("data-pst-original-title");

    const parts = derivePartsFromName(display, data);
    if (!parts) {
      titleEl.textContent = display;
      return;
    }

    titleEl.innerHTML =
      '<span class="pst-detail-title-main">' + escapeHtml(parts.main) + '</span>' +
      '<span class="pst-detail-title-components">' + escapeHtml(parts.components) + '</span>';
  };

  window.pstApplyStackBlendDetailTitleSplit = function() {
    const titleEl = document.getElementById("selectedName");
    if (!titleEl) return;

    let currentData = null;
    if (typeof selectedKey !== "undefined" && selectedKey) {
      if (typeof productData !== "undefined" && productData && productData[selectedKey]) currentData = productData[selectedKey];
      if (!currentData && typeof stackData !== "undefined" && stackData && stackData[selectedKey]) currentData = stackData[selectedKey];
    }

    const currentText = titleEl.textContent || "";
    const parts = derivePartsFromName(currentText, currentData);

    if (!parts) {
      if (currentData && currentData.display) titleEl.textContent = currentData.display;
      return;
    }

    titleEl.removeAttribute("data-pst-original-title");
    titleEl.innerHTML =
      '<span class="pst-detail-title-main">' + escapeHtml(parts.main) + '</span>' +
      '<span class="pst-detail-title-components">' + escapeHtml(parts.components) + '</span>';
  };
})();
</script>

<script>
(function(){
  function pstSafeText(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch];
    });
  }

  window.pstShowCartAddNotice = function(item) {
    var label = item && (item.fullLabel || item.display || item.sku || item.id)
      ? String(item.fullLabel || item.display || item.sku || item.id)
      : "Product";

    var countEl = document.getElementById("cartCount");
    if (countEl) {
      countEl.style.transition = "transform 160ms ease, box-shadow 160ms ease";
      countEl.style.transform = "scale(1.22)";
      countEl.style.boxShadow = "0 0 0 4px rgba(0,63,158,.18)";
      setTimeout(function(){
        countEl.style.transform = "";
        countEl.style.boxShadow = "";
      }, 650);
    }

    var toast = document.getElementById("pstCartToastForce");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "pstCartToastForce";
      toast.setAttribute("role", "status");
      toast.setAttribute("aria-live", "polite");
      document.body.appendChild(toast);
    }

    toast.innerHTML = '<div style="font-size:15px;font-weight:900;line-height:1.2;">✅ Product added to cart</div>' +
      '<div style="font-size:12px;font-weight:800;line-height:1.25;margin-top:4px;opacity:.95;">' + pstSafeText(label) + '</div>';

    Object.assign(toast.style, {
      position: "fixed",
      top: "18px",
      left: "50%",
      transform: "translateX(-50%) translateY(0)",
      zIndex: "2147483647",
      background: "#003f9e",
      color: "#ffffff",
      border: "2px solid #ffffff",
      borderRadius: "14px",
      padding: "13px 18px",
      boxShadow: "0 16px 45px rgba(0,0,0,.35)",
      width: "min(440px, calc(100vw - 28px))",
      textAlign: "center",
      opacity: "1",
      pointerEvents: "none",
      transition: "opacity 180ms ease, transform 180ms ease",
      fontFamily: "Arial, Helvetica, sans-serif"
    });

    clearTimeout(window.pstCartToastForceTimer);
    window.pstCartToastForceTimer = setTimeout(function(){
      toast.style.opacity = "0";
      toast.style.transform = "translateX(-50%) translateY(-10px)";
    }, 2400);

    console.log("✅ Product added to cart toast shown:", label);
  };

  if (typeof window.addItem === "function") {
    var originalAddItem = window.addItem;
    window.addItem = function(item) {
      var beforeQty = Array.isArray(window.cart) ? window.cart.reduce(function(sum, i){ return sum + Number(i.quantity || 0); }, 0) : null;
      originalAddItem.call(this, item);
      try {
        var afterQty = Array.isArray(window.cart) ? window.cart.reduce(function(sum, i){ return sum + Number(i.quantity || 0); }, 0) : null;
        if (afterQty === beforeQty || !document.getElementById("pstCartToastForce")) {
          window.pstShowCartAddNotice(item);
        }
      } catch (e) {
        window.pstShowCartAddNotice(item);
      }
    };
  }
})();
</script>

<script>
(function(){
  function pstClearProductDetail(){
    var detail = document.getElementById('product-detail') || document.querySelector('.product-detail');
    if (detail) detail.classList.remove('active');
  }

  function pstAzTopTarget(){
    return document.querySelector('#az .section-title') ||
           document.querySelector('#az .az-letter-jump-wrap') ||
           document.getElementById('az');
  }

  function pstScrollToAzClean(){
    pstClearProductDetail();
    var target = pstAzTopTarget();
    if (!target) return;

    function doScroll(behavior){
      var y = target.getBoundingClientRect().top + window.pageYOffset - 4;
      window.scrollTo({ top: Math.max(y, 0), behavior: behavior || 'smooth' });
    }

    doScroll('smooth');
    setTimeout(function(){ doScroll('auto'); }, 120);
    setTimeout(function(){ doScroll('auto'); }, 360);
  }

  function pstWireAzLinks(){
    var links = document.querySelectorAll('a[href="#az"], a[href$="#az"]');
    links.forEach(function(link){
      if (link.dataset.pstAzTrueTopWired === '1') return;
      link.dataset.pstAzTrueTopWired = '1';
      link.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        pstScrollToAzClean();
        if (history && history.replaceState) history.replaceState(null, '', '#az');
      }, true);
    });
  }

  window.addEventListener('hashchange', function(){
    if (window.location.hash === '#az') pstScrollToAzClean();
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', pstWireAzLinks);
  } else {
    pstWireAzLinks();
  }

  window.pstScrollToAzClean = pstScrollToAzClean;
})();
</script>
