name: One-time admin jump border black

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Change only admin jump-link border color
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('admin.html')
          text = path.read_text()
          old = '''.admin-dashboard-nav .btn {
  background: #fff;
  color: var(--dark);
  border: 1px solid var(--border);
}'''
          new = '''.admin-dashboard-nav .btn {
  background: #fff;
  color: var(--dark);
  border: 1px solid #000;
}'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one admin jump-link block; found {count}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit exact change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.html
          git diff --cached --quiet && exit 0
          git commit -m "Make admin jump-link outlines black"
          git push
