</head><body><header class="pst-admin-header">

</header><main><div id="status" class="status">Checking admin access...</div><div class="grid"><section class="card"><h2>Create / Edit Promotion</h2><div class="card-body"><div class="fields"><div class="field full"><label>Promotion ID</label><select id="promoSelect"><option value="">New promotion</option></select></div><div class="field"><label>Title</label><input id="title"></div><div class="field"><label>Badge / Label</label><input id="badge" placeholder="Limited Time"></div><div class="field full"><label>Body</label><textarea id="body"></textarea></div><div class="field"><label>Button Text</label><input id="button_text"></div><div class="field"><label>Button Link</label><input id="button_link" placeholder="register.html"></div><div class="field"><label>Linked Discount Code</label><select id="discount_id"><option value="">No linked discount</option></select><div class="field-note">Dropdown pulls from Discount Manager. No manual code typing.</div></div><div class="field"><label>Auto-Apply After Account Creation</label><select id="auto_apply_discount"><option value="false">No</option><option value="true">Yes</option></select></div><div class="field full"><label>Image URL</label><input id="image_url"></div><div class="field"><label>Start Date/Time</label><input id="starts_at" type="datetime-local"></div><div class="field"><label>End Date/Time</label><input id="ends_at" type="datetime-local"></div><div class="field"><label>Sort Order</label><input id="sort_order" type="number" value="100"></div><div class="field"><label>Alignment</label><select id="text_align"><option>center</option><option>left</option><option>right</option></select></div><div class="field"><label>Title Size</label><input id="title_size" type="number" value="28"></div><div class="field"><label>Body Size</label><input id="body_size" type="number" value="15"></div><div class="field"><label>Text Color</label><input id="text_color" type="color" value="#101820"></div><div class="field"><label>Background</label><input id="background_color" type="color" value="#ffffff"></div><div class="field"><label>Accent Color</label><input id="accent_color" type="color" value="#003f9e"></div><div class="field full"><label>Formatting</label><div class="inline"><label><input id="is_active" type="checkbox"> Active</label><label><input id="title_bold" type="checkbox" checked> Title Bold</label><label><input id="title_italic" type="checkbox"> Title Italic</label><label><input id="title_underline" type="checkbox"> Title Underline</label><label><input id="body_bold" type="checkbox"> Body Bold</label><label><input id="body_italic" type="checkbox"> Body Italic</label><label><input id="body_underline" type="checkbox"> Body Underline</label></div></div><div class="field full"><div class="inline"><button class="btn success" id="saveBtn">Save Promotion</button><button class="btn secondary" id="newBtn">New</button><button class="btn danger" id="deleteBtn">Delete</button></div></div></div></div></section><section class="card"><h2>Live Preview</h2><div class="card-body"><div id="preview" class="preview"></div></div></section><section class="card full"><h2>Saved Promotions</h2><div class="card-body"><div id="promoList" class="list"></div></div></section></div></main><script>
const PST_SUPABASE_URL='https://ucejjztsbmrogiteivxl.supabase.co';const PST_SUPABASE_PUBLISHABLE_KEY='sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX';const db=window.supabase.createClient(PST_SUPABASE_URL,PST_SUPABASE_PUBLISHABLE_KEY);let currentUser=null,promos=[],discounts=[];const $=id=>document.getElementById(id);function setStatus(m,t=''){const statusEl=document.getElementById('status');if(statusEl){statusEl.textContent=m;statusEl.className='status '+t}else{console.log(m)}}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function isoLocal(v){if(!v)return'';const d=new Date(v);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}function fromLocal(v){return v?new Date(v).toISOString():null}
function discountLabel(d){
 const code=String(d?.code||'').toUpperCase();
 const pct=Number(d?.percent_off||0);
 const amt=Number(d?.amount_off||0);
 const active=d?.active!==false?'Active':'Inactive';
 const value=pct>0?(pct+'% off'):(amt>0?('$'+amt.toFixed(2)+' off'):'No value set');
 const assigned=d?.assigned_email?(' · '+d.assigned_email):'';
 return code+' — '+value+' — '+active+assigned;
}
async function loadDiscountOptions(){
 const sel=$('discount_id'); if(!sel) return;
 const {data,error}=await db.from('discount_codes').select('id,code,percent_off,amount_off,active,assigned_email,expires_at').order('code',{ascending:true});
 if(error){console.warn('Discount dropdown unavailable:',error.message||error);return;}
 discounts=data||[];
 sel.innerHTML='<option value="">No linked discount</option>'+discounts.map(d=>`<option value="${esc(d.id)}">${esc(discountLabel(d))}</option>`).join('');
}
function selectedDiscount(){const id=$('discount_id')?.value||'';return discounts.find(d=>d.id===id)||null;}
function data(){return{title:title.value,body:body.value,badge:badge.value,button_text:button_text.value,button_link:button_link.value,image_url:image_url.value,discount_id:discount_id.value||null,auto_apply_discount:auto_apply_discount.value==="true",is_active:is_active.checked,starts_at:fromLocal(starts_at.value),ends_at:fromLocal(ends_at.value),sort_order:Number(sort_order.value||100),title_bold:title_bold.checked,title_italic:title_italic.checked,title_underline:title_underline.checked,body_bold:body_bold.checked,body_italic:body_italic.checked,body_underline:body_underline.checked,title_size:Number(title_size.value||28),body_size:Number(body_size.value||15),text_align:text_align.value,text_color:text_color.value,background_color:background_color.value,accent_color:accent_color.value}}function fill(p={}){title.value=p.title||'';body.value=p.body||'';badge.value=p.badge||'';button_text.value=p.button_text||'';button_link.value=p.button_link||'';image_url.value=p.image_url||'';if($('discount_id')) discount_id.value=p.discount_id||'';if($('auto_apply_discount')) auto_apply_discount.value=p.auto_apply_discount?'true':'false';is_active.checked=!!p.is_active;starts_at.value=isoLocal(p.starts_at);ends_at.value=isoLocal(p.ends_at);sort_order.value=p.sort_order??100;title_bold.checked=p.title_bold??true;title_italic.checked=!!p.title_italic;title_underline.checked=!!p.title_underline;body_bold.checked=!!p.body_bold;body_italic.checked=!!p.body_italic;body_underline.checked=!!p.body_underline;title_size.value=p.title_size??28;body_size.value=p.body_size??15;text_align.value=p.text_align||'center';text_color.value=p.text_color||'#101820';background_color.value=p.background_color||'#ffffff';accent_color.value=p.accent_color||'#003f9e';renderPreview()}function renderPreview(){const p=data();const d=selectedDiscount();const linkedCode=d?.code?('Code: '+String(d.code).toUpperCase()):'';preview.style.background=p.background_color;preview.style.textAlign=p.text_align;preview.style.alignItems=p.text_align==='left'?'flex-start':p.text_align==='right'?'flex-end':'center';preview.innerHTML=`${p.badge?`<div class="badge" style="color:${p.accent_color};background:#f4f8ff">${esc(p.badge)}</div>`:''}${p.image_url?`<img src="${esc(p.image_url)}">`:''}<div style="font-size:${p.title_size}px;color:${p.text_color};font-weight:${p.title_bold?900:400};font-style:${p.title_italic?'italic':'normal'};text-decoration:${p.title_underline?'underline':'none'}">${esc(p.title||'Promotion Title')}</div><div style="margin-top:8px;font-size:${p.body_size}px;color:${p.text_color};font-weight:${p.body_bold?800:400};font-style:${p.body_italic?'italic':'normal'};text-decoration:${p.body_underline?'underline':'none'}">${esc(p.body||'Promotion body text...')}</div>${(p.button_text||linkedCode)?`<a style="background:${p.accent_color}" href="${esc(p.button_link||'#')}">${esc(p.button_text||linkedCode)}</a>`:''}`}
async function loadPromos(){const {data,error}=await db.from('site_promotions').select('*, discount_codes(id,code,percent_off,amount_off,active,assigned_email,expires_at)').order('sort_order',{ascending:true}).order('created_at',{ascending:false});if(error){setStatus(error.message,'bad');return}promos=data||[];promoSelect.innerHTML='<option value="">New promotion</option>'+promos.map(p=>`<option value="${p.id}">${esc(p.title||'(Untitled)')}</option>`).join('');promoList.innerHTML=promos.map(p=>`<div class="promo-row"><div><strong>${esc(p.title||'(Untitled)')}</strong><span class="promo-list-meta"><span class="pst-mini-pill ${p.is_active?'is-active':'is-inactive'}">${p.is_active?'Active':'Inactive'}</span><span class="pst-mini-pill is-sort">Sort ${p.sort_order??100}</span>${p.discount_codes?.code?'<span class="pst-mini-pill is-code">Code '+esc(String(p.discount_codes.code).toUpperCase())+'</span>':''}</span></div><button class="btn secondary" onclick="editPromo('${p.id}')">Edit</button></div>`).join('')||'<div class="muted">No promotions yet.</div>';setStatus('Promotion manager ready.','good')}function editPromo(id){const p=promos.find(x=>x.id===id);promoSelect.value=id;if(p)fill(p)}async function savePromo(){const payload=data();let res;if(promoSelect.value){res=await db.from('site_promotions').update(payload).eq('id',promoSelect.value)}else{res=await db.from('site_promotions').insert(payload)}if(res.error){setStatus(res.error.message,'bad');return}setStatus('Promotion saved.','good');await loadPromos()}async function deletePromo(){if(!promoSelect.value)return;if(!confirm('Delete this promotion?'))return;const {error}=await db.from('site_promotions').delete().eq('id',promoSelect.value);if(error){setStatus(error.message,'bad');return}fill({});promoSelect.value='';await loadPromos()}async function init(){const {data:{user}}=await db.auth.getUser();if(!user){setStatus('Please log in first.','bad');return}currentUser=user;const {data:admin}=await db.from('admin_users').select('user_id').eq('user_id',user.id).eq('is_active',true).maybeSingle();if(!admin){setStatus('Admin access required.','bad');return}await loadDiscountOptions();await loadPromos()}document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input',renderPreview);
  });

  const promoSelectEl=document.getElementById('promoSelect');
  const saveBtnEl=document.getElementById('saveBtn');
  const deleteBtnEl=document.getElementById('deleteBtn');
  const newBtnEl=document.getElementById('newBtn');

  if(promoSelectEl){
    promoSelectEl.addEventListener('change',()=>{
      promoSelectEl.value?editPromo(promoSelectEl.value):fill({});
    });
  }

  if(saveBtnEl) saveBtnEl.onclick=savePromo;
  if(deleteBtnEl) deleteBtnEl.onclick=deletePromo;
  if(newBtnEl){
    newBtnEl.onclick=()=>{
      if(promoSelectEl) promoSelectEl.value='';
      fill({});
    };
  }

  try{
    fill({});
    init();
  }catch(err){
    console.error(err);
    const statusEl=document.getElementById('status');
    if(statusEl){
      statusEl.textContent=err.message||String(err);
      statusEl.className='status bad';
    }
  }
});
</script></body></html>
