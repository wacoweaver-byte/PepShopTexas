const PST_SUPABASE_URL='https://ucejjztsbmrogiteivxl.supabase.co';const PST_SUPABASE_PUBLISHABLE_KEY='sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX';const db=window.supabase.createClient(PST_SUPABASE_URL,PST_SUPABASE_PUBLISHABLE_KEY);let currentUser=null,promos=[],discounts=[];const $=id=>document.getElementById(id);function setStatus(m,t=''){const statusEl=document.getElementById('status');if(statusEl){statusEl.textContent=m;statusEl.className='status '+t}else{console.log(m)}}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function isoLocal(v){if(!v)return'';const d=new Date(v);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}function fromLocal(v){return v?new Date(v).toISOString():null}

le.alignItems=p.text_align==='left'?'flex-start':p.text_align==='right'?'flex-end':'center';preview.innerHTML=`${p.badge?`<div class="badge" style="color:${p.accent_color};background:#f4f8ff">${esc(p.badge)}</div>`:''}${p.image_url?`<img src="${esc(p.image_url)}">`:''}<div style="font-size:${p.title_size}px;color:${p.text_color};font-weight:${p.title_bold?900:400};font-style:${p.title_italic?'italic':'normal'};text-decoration:${p.title_underline?'underline':'none'}">${esc(p.title||'Promotion Title')}</div><div style="margin-top:8px;font-size:${p.body_size}px;color:${p.text_color};font-weight:${p.body_bold?800:400};font-style:${p.body_italic?'italic':'normal'};text-decoration:${p.body_underline?'underline':'none'}">${esc(p.body||'Promotion body text...')}</div>${(p.button_text||linkedCode)?`<a style="background:${p.accent_color}" href="${esc(p.button_link||'#')}">${esc(p.button_text||linkedCode)}</a>`:''}`}
async function loadPromos(){const {data,error}=await db.from('site_promotions').select('*, discount_codes(id,code,percent_off,amount_off,active,assigned_email,expires_at)').order('sort_order',{ascending:true}).order('created_at',{ascending:false});if(error){setStatus(error.message,'bad');return}promos=data||[];promoSelect.innerHTML='<option value="">New promotion</option>'+promos.map(p=>`<option value="${p.id}">${esc(p.title||'(Untitled)')}</option>`).join('');promoList.innerHTML=promos.map(p=>`<div class="promo-row"><div><strong>${esc(p.title||'(Untitled)')}</strong><span class="promo-list-meta"><span class="pst-mini-pill ${p.is_active?'is-active':'is-inactive'}">${p.is_active?'Active':'Inactive'}</span><span class="pst-mini-pill is-sort">Sort ${p.sort_order??100}</span>${p.discount_codes?.code?'<span class="pst-mini-pill is-code">Code '+esc(String(p.discount_codes.code).toUpperCase())+'</span>':''}</span></div><button class="btn secondary" onclick="editPromo('${p.id}')">Edit</button></div>`).join('')||'<div class="muted">No promotions yet.</div>';setStatus('Promotion manager ready.','good')}function editPromo(id){const p=promos.find(x=>x.id===id);promoSelect.value=id;if(p)fill(p)}async function savePromo(){const payload=data();let res;if(promoSelect.value){res=await db.from('site_promotions').update(payload).eq('id',promoSelect.value)}else{res=await db.from('site_promotions').insert(payload)}if(res.error){setStatus(res.error.message,'bad');return}setStatus('Promotion saved.','good');await loadPromos()}async function deletePromo(){if(!promoSelect.value)return;if(!confirm('Delete this promotion?'))return;const {error}=await db.from('site_promotions').delete().eq('id',promoSelect.value);if(error){setStatus(error.message,'bad');return}fill({});promoSelect.value='';await loadPromos()}async function init(){const {data:{user}}=await db.auth.getUser();if(!user){setStatus('Please log in first.','bad');return}currentUser=user;const {data:admin}=await db.from('admin_users').select('user_id').eq('user_id',user.id).eq('is_active',true).maybeSingle();if(!admin){setStatus('Admin access required.','bad');return}await loadDiscountOptions();await loadPromos()}document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input',renderPreview);
  });

  const promoSelectEl=document.getElementById('promoSelect');
  const saveBtnEl=document.getElementById('saveBtn');
  const deleteBtnEl=document.getElementById('deleteBtn');
  const newBtnEl=document.getElementById('newBtn');

  if(promoSelectEl){
    promoSelectEl.addEventListener('change',()=>{
      promoSelectEl.value?editPromo(promoSelectEl.value):fill({});
    });
  }

  if(saveBtnEl) saveBtnEl.onclick=savePromo;
  if(deleteBtnEl) deleteBtnEl.onclick=deletePromo;
  if(newBtnEl){
    newBtnEl.onclick=()=>{
      if(promoSelectEl) promoSelectEl.value='';
      fill({});
    };
  }

  try{
    fill({});
    init();
  }catch(err){
    console.error(err);
    const statusEl=document.getElementById('status');
    if(statusEl){
      statusEl.textContent=err.message||String(err);
      statusEl.className='status bad';
    }
  }
});
</script></body></html>
