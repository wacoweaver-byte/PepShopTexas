<head>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

</head>
<body>
  <header class="pst-customer-header"><div class="pst-customer-header-inner"><a class="pst-customer-logo-link" href="index.html" aria-label="Pep Shop Texas home"><img src="customer facing header logo.png" alt="PST Pep Shop Texas" class="pst-customer-header-logo"></a><div class="pst-customer-header-right"><form class="pst-customer-search" role="search" action="catalog.html" method="get"><label class="sr-only" for="pst-customer-search-input">Search peptides</label><input id="pst-customer-search-input" name="search" type="search" placeholder="Search peptides..." autocomplete="off"><button type="submit" aria-label="Search"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path></svg></button></form><nav class="pst-customer-nav main-nav" aria-label="Main navigation"><a href="catalog.html">PEPTIDES A-Z <span aria-hidden="true">⌄</span></a><a href="catalog.html?category=Stack">TOP STACKS <span aria-hidden="true">⌄</span></a><a href="faq.html">FAQ</a><a href="contact.html">CONTACT</a><a href="account.html" data-account-link>LOGIN</a><a href="cart.html">CART <span class="pst-cart-count" data-cart-count>0</span></a></nav></div></div></header>
  <main class="wrap"><section class="auth-card"><h1 class="section-title">Reset Password</h1><div class="underline"></div><p class="small">Enter a new password after opening the secure password reset link from your email.</p><form id="resetPasswordForm" hidden><label for="newPassword">New Password</label><div class="password-wrap"><input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required minlength="10"><button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Show password">Show</button></div><label for="confirmPassword">Confirm New Password</label><div class="password-wrap"><input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required minlength="10"><button class="password-toggle" type="button" data-toggle-password="confirmPassword" aria-label="Show password">Show</button></div><div class="actions"><button id="savePasswordBtn" class="btn primary" type="submit">Save New Password</button><a class="btn secondary" href="login.html">Back to Login</a></div></form><div id="notice" class="notice info">Checking reset link...</div></section></main>
  <script>
const SUPABASE_URL="https://ucejjztsbmrogiteivxl.supabase.co";
const SUPABASE_PUBLISHABLE_KEY="sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX";
const pstSupabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
function showNotice(message,type="info"){const el=document.getElementById("notice");if(!el)return;el.textContent=message;el.className="notice "+type;}
function setupPasswordToggles(){document.querySelectorAll("[data-toggle-password]").forEach(function(btn){const input=document.getElementById(btn.getAttribute("data-toggle-password"));if(!input)return;btn.addEventListener("click",function(){const show=input.type==="password";input.type=show?"text":"password";btn.textContent=show?"Hide":"Show";btn.setAttribute("aria-label",show?"Hide password":"Show password");});});}
setupPasswordToggles();
let recoverySessionReady=false;
function enableResetForm(){recoverySessionReady=true;const form=document.getElementById("resetPasswordForm");if(form)form.hidden=false;showNotice("Reset link confirmed. Enter your new password.","ok");}
async function checkRecoverySession(){const {data,error}=await pstSupabaseClient.auth.getSession();if(data&&data.session&&data.session.user){enableResetForm();return;}if(error){showNotice("Could not verify reset link: "+error.message,"err");return;}showNotice("This page must be opened from the password reset email. If the link expired, request a new one.","err");}
pstSupabaseClient.auth.onAuthStateChange(function(event,session){if((event==="PASSWORD_RECOVERY"||event==="SIGNED_IN")&&session&&session.user)enableResetForm();});
setTimeout(checkRecoverySession,600);
document.getElementById("resetPasswordForm").addEventListener("submit",async function(event){event.preventDefault();if(!recoverySessionReady){showNotice("Open this page from the password reset email before saving a new password.","err");return;}const password=document.getElementById("newPassword").value;const confirm=document.getElementById("confirmPassword").value;const btn=document.getElementById("savePasswordBtn");if(password.length<10){showNotice("Password must be at least 10 characters.","err");return;}if(password!==confirm){showNotice("New passwords do not match.","err");return;}btn.disabled=true;btn.textContent="Saving...";showNotice("Saving new password...","info");try{const {error}=await pstSupabaseClient.auth.updateUser({password});if(error)throw error;showNotice("Password updated successfully. Redirecting to login...","ok");await pstSupabaseClient.auth.signOut();setTimeout(function(){window.location.href="login.html?password=reset";},1200);}catch(err){showNotice("Password could not be updated: "+(err.message||err),"err");}finally{btn.disabled=false;btn.textContent="Save New Password";}});
  </script>
</body>
</html>
