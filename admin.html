<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin | Pep Shop Texas</title><style>
:root{--blue:#003f9e;--black:#050505;--line:#e6e6e6;--soft:#f7f7f7;--muted:#555}*{box-sizing:border-box}body{margin:0;background:#fff;color:#050505;font-family:Arial,Helvetica,sans-serif}.top-strip{background:#050505;color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;display:flex;justify-content:space-between;gap:20px;padding:9px 36px}header{background:#fff;border-bottom:1px solid var(--line)}.nav{max-width:1280px;margin:auto;padding:14px 34px;display:flex;justify-content:space-between;align-items:center;gap:24px}.brand{font-family:Impact,'Arial Black',Arial,sans-serif;font-size:34px;text-decoration:none;color:#111;letter-spacing:.5px}.brand span{color:var(--blue)}.menu{display:flex;gap:22px;align-items:center;text-transform:uppercase;font-weight:900;font-size:14px}.menu a{color:#111;text-decoration:none}.menu a.active{color:var(--blue);border-bottom:2px solid var(--blue);padding-bottom:6px}.wrap{max-width:980px;margin:auto;padding:34px}.auth-card{border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 12px 35px rgba(0,0,0,.08);padding:30px}.section-title{font-family:Impact,'Arial Black',Arial,sans-serif;text-transform:uppercase;font-size:38px;margin:0}.underline{width:42px;height:4px;background:var(--blue);margin:8px 0 22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1 / -1}label{font-size:12px;font-weight:900;text-transform:uppercase;color:#333;display:block;margin:0 0 6px}input,select,textarea{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:6px;font-size:15px}textarea{min-height:110px}.check-row{display:flex;gap:10px;align-items:flex-start;margin:12px 0;font-weight:800;line-height:1.4}.check-row input{width:auto;margin-top:3px}.btn{display:inline-block;border:2px solid var(--blue);border-radius:4px;padding:13px 26px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none}.btn.primary{background:var(--blue);color:#fff}.btn.secondary{background:#fff;color:var(--blue)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}.notice{display:none;margin:18px 0 0;padding:12px;border-radius:6px;font-weight:800;line-height:1.45}.notice.ok{display:block;background:#edf8f0;color:#147a32;border:1px solid #bfe8c8}.notice.err{display:block;background:#fff0f0;color:#b00020;border:1px solid #ffb8c0}.small{font-size:13px;color:#555;line-height:1.5}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.admin-table{width:100%;border-collapse:collapse;font-size:14px}.admin-table th,.admin-table td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.admin-table th{background:#f4f8ff;text-transform:uppercase;font-size:12px}.status-pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#f4f8ff;color:#003f9e;font-weight:900;font-size:12px;text-transform:uppercase}@media(max-width:720px){.grid{grid-template-columns:1fr}.menu{display:none}.wrap,.nav{padding-left:18px;padding-right:18px}.top-strip{display:none}}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ucejjztsbmrogiteivxl.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
function showNotice(id, message, type){ const el=document.getElementById(id); el.textContent=message; el.className='notice '+(type==='ok'?'ok':'err'); }
</script></head><body><div class="top-strip"><span>Research purposes only — not for human consumption</span><span>Support: support@pepshoptexas.com</span></div><header><nav class="nav"><a class="brand" href="index.html">P<span>S</span>T</a><div class="menu"><a href="index.html">Home</a><a href="register.html">Create Account</a><a href="login.html">Login</a><a href="account.html">My Account</a><a href="admin.html">Admin</a></div></nav></header><main class="wrap"><section class="auth-card"><h1 class="section-title">Admin Customers</h1><div class="underline"></div><p class="small">Admin access requires your Supabase user ID to be added to the <strong>admin_users</strong> table using the setup SQL file.</p><div class="actions"><button class="btn primary" id="loadBtn">Load Customers</button><button class="btn secondary" onclick="location.href='login.html'">Login</button></div><div id="notice" class="notice"></div><div id="adminArea" style="margin-top:22px"></div></section></main><script>document.getElementById('loadBtn').addEventListener('click', loadCustomers); async function loadCustomers(){ const {data:{session}}=await supabase.auth.getSession(); if(!session){showNotice('notice','Login first, then return to admin.','err');return;} const {data,error}=await supabase.from('customer_profiles').select('*').order('created_at',{ascending:false}); if(error){showNotice('notice','Admin access not available yet: '+error.message,'err');return;} let rows=data.map(c=>`<tr><td><strong>${c.first_name||''} ${c.last_name||''}</strong><br>${c.email||''}<br>${c.phone||''}</td><td>${c.username||''}</td><td><select data-id="${c.user_id}" class="statusSelect"><option ${c.account_status==='active'?'selected':''} value="active">Active</option><option ${c.account_status==='payment_hold'?'selected':''} value="payment_hold">Payment Hold</option><option ${c.account_status==='tos_violation'?'selected':''} value="tos_violation">TOS Violation</option><option ${c.account_status==='deactivated'?'selected':''} value="deactivated">Deactivated</option></select></td><td>${c.shipping_address||''}<br>${c.shipping_city||''}, ${c.shipping_state||''} ${c.shipping_zip||''}</td><td><textarea data-id="${c.user_id}" class="adminNotes">${c.admin_notes||''}</textarea><button class="btn secondary saveNote" data-id="${c.user_id}">Save</button></td></tr>`).join(''); document.getElementById('adminArea').innerHTML=`<div class="table-wrap"><table class="admin-table"><thead><tr><th>Customer</th><th>Username</th><th>Status</th><th>Shipping</th><th>Admin Notes</th></tr></thead><tbody>${rows}</tbody></table></div>`; document.querySelectorAll('.statusSelect').forEach(sel=>sel.addEventListener('change',async(e)=>{const {error}=await supabase.from('customer_profiles').update({account_status:e.target.value}).eq('user_id',e.target.dataset.id); showNotice('notice',error?error.message:'Customer status updated.',error?'err':'ok');})); document.querySelectorAll('.saveNote').forEach(btn=>btn.addEventListener('click',async(e)=>{const id=e.target.dataset.id; const note=document.querySelector(`textarea.adminNotes[data-id="${id}"]`).value; const {error}=await supabase.from('customer_profiles').update({admin_notes:note}).eq('user_id',id); showNotice('notice',error?error.message:'Admin note saved.',error?'err':'ok');}));}</script></body></html>
