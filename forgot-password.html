  <main class="wrap"><section class="auth-card"><h1 class="section-title">Forgot Password</h1><div class="underline"></div><p class="small">Enter your account email. If the email is registered, Pep Shop Texas will send a secure password reset link.</p><form id="forgotPasswordForm"><label>Email Address</label><input id="email" name="email" type="email" autocomplete="email" required><div class="actions"><button id="resetBtn" class="btn primary" type="submit">Send Reset Link</button><a class="btn secondary" href="login.html">Back to Login</a></div></form><div id="notice" class="notice"></div><div class="help-box">For security, this page uses the same message whether or not an email exists in the system.</div></section></main>
  <script>
const SUPABASE_URL = "https://ucejjztsbmrogiteivxl.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX";
const pstSupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
function showNotice(message, type="info"){ const el=document.getElementById("notice"); if(!el)return; el.textContent=message; el.className="notice "+type; }
function getResetRedirectUrl(){ return window.location.origin.replace(/\/$/, "") + "/reset-password.html"; }
document.getElementById("forgotPasswordForm").addEventListener("submit", async function(event){ event.preventDefault(); const email=document.getElementById("email").value.trim(); const btn=document.getElementById("resetBtn"); if(!email){showNotice("Enter your email address.","err");return;} btn.disabled=true; btn.textContent="Sending..."; showNotice("Sending password reset email...","info"); try{ const {error}=await pstSupabaseClient.auth.resetPasswordForEmail(email,{redirectTo:getResetRedirectUrl()}); if(error)throw error; showNotice("If this email is registered, a password reset link has been sent. Check your inbox and spam folder.","ok"); document.getElementById("forgotPasswordForm").reset(); }catch(err){ showNotice("Password reset email could not be sent: "+(err.message||err),"err"); }finally{ btn.disabled=false; btn.textContent="Send Reset Link"; } });
  </script>
