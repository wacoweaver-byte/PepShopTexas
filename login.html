<style id="pst-login-page-actions-compact-pill-style-v1">
/* PST Login page compact pill style
   Customer-facing header is intentionally untouched.
   Scope only: login/auth page action controls, auth links, status message, and mobile sizing. */
:root {
  --pst-login-pill-h: 26px;
  --pst-login-pill-font: 10px;
  --pst-login-pill-weight: 700;
  --pst-login-pill-radius: 999px;
  --pst-login-pill-pad-x: 10px;
  --pst-login-pill-line: #c9ced6;
  --pst-login-pill-ink: #101820;
  --pst-login-pill-blue: #003f9e;
  --pst-login-pill-red: #bd0000;
  --pst-login-pill-green: #0c6b3a;
  --pst-login-pill-danger: #8a1f17;
}

/* Auth page controls only. Do not target .site-header, .main-nav, .search, header cart link/count, or footer nav. */
.auth-page .primary-action,
.auth-page .secondary-action,
.auth-page button,
.auth-page .btn,
.auth-page a.btn,
.auth-page .auth-links a,
.auth-page .pill,
.auth-page .badge,
.auth-page .status-pill {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  box-sizing: border-box !important;
  flex: 0 0 auto !important;
  width: auto !important;
  min-width: 0 !important;
  max-width: max-content !important;
  min-height: var(--pst-login-pill-h) !important;
  height: var(--pst-login-pill-h) !important;
  margin: 0 !important;
  padding: 0 var(--pst-login-pill-pad-x) !important;
  border: 1px solid currentColor !important;
  border-radius: var(--pst-login-pill-radius) !important;
  background: #ffffff !important;
  color: var(--pst-login-pill-ink) !important;
  font-family: Arial, Helvetica, sans-serif !important;
  font-size: var(--pst-login-pill-font) !important;
  font-weight: var(--pst-login-pill-weight) !important;
  line-height: 1 !important;
  letter-spacing: 0 !important;
  text-align: center !important;
  text-transform: none !important;
  text-decoration: none !important;
  white-space: nowrap !important;
  vertical-align: middle !important;
  box-shadow: none !important;
}

/* Sign In / primary auth action. */
.auth-page .primary-action,
.auth-page button[type="submit"],
.auth-page button.primary,
.auth-page .btn.primary {
  color: var(--pst-login-pill-green) !important;
  background: #ffffff !important;
  border-color: var(--pst-login-pill-green) !important;
  cursor: pointer !important;
}

/* Reset password / create account links. */
.auth-page .auth-links {
  display: flex !important;
  align-items: center !important;
  gap: 6px !important;
  flex-wrap: wrap !important;
}

.auth-page .auth-links a,
.auth-page .secondary-action,
.auth-page .btn.secondary {
  color: var(--pst-login-pill-blue) !important;
  background: #ffffff !important;
  border-color: var(--pst-login-pill-blue) !important;
  cursor: pointer !important;
}

/* Disabled state matches compact grey Out style. */
.auth-page button:disabled,
.auth-page .btn:disabled,
.auth-page button[aria-disabled="true"],
.auth-page .btn[aria-disabled="true"],
.auth-page a[aria-disabled="true"],
.auth-page .disabled {
  color: #6f7680 !important;
  background: #ffffff !important;
  border-color: var(--pst-login-pill-line) !important;
  opacity: 1 !important;
  cursor: not-allowed !important;
  pointer-events: none !important;
}

/* Auth message remains readable text, not a button. */
.auth-page [data-auth-message] {
  font-family: Arial, Helvetica, sans-serif !important;
  font-size: 13px !important;
  font-weight: 400 !important;
  line-height: 1.35 !important;
}

/* Mobile: preserve compact pill sizing. */
@media (max-width: 700px) {
  .auth-page .primary-action,
  .auth-page .secondary-action,
  .auth-page button,
  .auth-page .btn,
  .auth-page a.btn,
  .auth-page .auth-links a,
  .auth-page .pill,
  .auth-page .badge,
  .auth-page .status-pill {
    min-height: 25px !important;
    height: 25px !important;
    padding: 0 9px !important;
    font-size: 9.5px !important;
  }

  .auth-page .auth-links {
    gap: 5px !important;
  }
}

@media (max-width: 390px) {
  .auth-page .primary-action,
  .auth-page .secondary-action,
  .auth-page button,
  .auth-page .btn,
  .auth-page a.btn,
  .auth-page .auth-links a,
  .auth-page .pill,
  .auth-page .badge,
  .auth-page .status-pill {
    min-height: 24px !important;
    height: 24px !important;
    padding: 0 8px !important;
    font-size: 9px !important;
  }
}
</style>

<body data-page="login">
  <header class="pst-customer-header">
  <div class="pst-customer-header-inner">
    <a class="pst-customer-logo-link" href="index.html" aria-label="Pep Shop Texas home">
      <img src="customer facing header logo.png" alt="PST Pep Shop Texas" class="pst-customer-header-logo">
    </a>

    <div class="pst-customer-header-right">
      <form class="pst-customer-search" role="search" action="catalog.html" method="get" data-product-search-form>
        <label class="sr-only" for="pst-customer-search-input">Search peptides</label>
        <input id="pst-customer-search-input" name="search" type="search" placeholder="Search peptides..." autocomplete="off">
        <button type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path>
          </svg>
        </button>
      </form>

      <nav class="pst-customer-nav main-nav" aria-label="Main navigation">
        <a href="catalog.html">PEPTIDES A-Z <span aria-hidden="true">⌄</span></a>
        <a href="catalog.html?category=Stack">TOP STACKS <span aria-hidden="true">⌄</span></a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">CONTACT</a>
        <a href="account.html" data-account-link>LOGIN</a>
<a class="cart-link" href="cart.html">CART <span class="pst-cart-count" data-cart-count>0</span></a>
      </nav>
    </div>
  </div>
</header>

  <main class="auth-page">
    <section class="page-heading"><p>Account access</p><h1>Sign In</h1></section>
    <section class="auth-shell">
      <form class="auth-card" data-login-form>
        <h2>Customer / Admin Login</h2>
        <label>Email <input name="email" type="email" autocomplete="email" required></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
        <button class="primary-action" type="submit">Sign In</button>
        <div class="auth-links"><a href="reset-password.html">Reset password</a><a href="register.html">Create account</a></div>
        <p data-auth-message></p>
      </form>
    </section>
  </main>
</body>
