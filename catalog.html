<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products | PEP Shop Texas</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#bd0000">
  <link rel="stylesheet" href="catalog-mobile-fix.css?v=7">
  <link rel="stylesheet" href="catalog-dose-text-fix.css?v=1">
  <link rel="stylesheet" href="css/customer.css?v=7">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js?v=40"></script>
  <script defer src="catalog-inventory-fix.js?v=6"></script>
</head>
<body data-page="products">
  <header class="pst-customer-header">
    <div class="pst-customer-header-inner">
      <a class="pst-customer-logo-link" href="index.html" aria-label="Pep Shop Texas home">
        <img src="customer facing header logo.png" alt="PST Pep Shop Texas" class="pst-customer-header-logo">
      </a>

      <div class="pst-customer-header-right">
        <form class="pst-customer-search" role="search" action="catalog.html" method="get" data-product-search-form>
          <label class="sr-only" for="pst-customer-search-input">Search peptides</label>
          <input id="pst-customer-search-input" name="search" type="search" placeholder="Search peptides..." autocomplete="off">
          <button type="submit" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path>
            </svg>
          </button>
        </form>

        <nav class="pst-customer-nav main-nav" aria-label="Main navigation">
          <a href="catalog.html">PEPTIDES A-Z <span aria-hidden="true">⌄</span></a>
          <a href="catalog.html?category=Stack">TOP STACKS <span aria-hidden="true">⌄</span></a>
          <a href="faq.html">FAQ</a>
          <a href="contact.html">CONTACT</a>
          <a href="account.html" data-account-link>LOGIN</a>
          <a href="cart.html">CART <span class="pst-cart-count" data-cart-count>0</span></a>
        </nav>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <section class="page-heading"><p>Research products</p><h1>Peptides A-Z</h1></section>
    <section class="catalog-toolbar">
      <input type="search" data-catalog-search placeholder="Filter products...">
      <select data-category-filter aria-label="Filter by category"><option value="">All categories</option></select>
    </section>
    <section class="catalog-grid" data-catalog-grid><p class="loading-row">Loading products...</p></section>
  </main>
</body>
</html>
