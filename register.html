<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Account | Pep Shop Texas</title><style>
:root{--blue:#003f9e;--black:#050505;--line:#e6e6e6;--soft:#f7f7f7;--muted:#555}*{box-sizing:border-box}body{margin:0;background:#fff;color:#050505;font-family:Arial,Helvetica,sans-serif}.top-strip{background:#050505;color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;display:flex;justify-content:space-between;gap:20px;padding:9px 36px}header{background:#fff;border-bottom:1px solid var(--line)}.nav{max-width:1280px;margin:auto;padding:14px 34px;display:flex;justify-content:space-between;align-items:center;gap:24px}.brand{font-family:Impact,'Arial Black',Arial,sans-serif;font-size:34px;text-decoration:none;color:#111;letter-spacing:.5px}.brand span{color:var(--blue)}.menu{display:flex;gap:22px;align-items:center;text-transform:uppercase;font-weight:900;font-size:14px}.menu a{color:#111;text-decoration:none}.menu a.active{color:var(--blue);border-bottom:2px solid var(--blue);padding-bottom:6px}.wrap{max-width:980px;margin:auto;padding:34px}.auth-card{border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 12px 35px rgba(0,0,0,.08);padding:30px}.section-title{font-family:Impact,'Arial Black',Arial,sans-serif;text-transform:uppercase;font-size:38px;margin:0}.underline{width:42px;height:4px;background:var(--blue);margin:8px 0 22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1 / -1}label{font-size:12px;font-weight:900;text-transform:uppercase;color:#333;display:block;margin:0 0 6px}input,select,textarea{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:6px;font-size:15px}textarea{min-height:110px}.check-row{display:flex;gap:10px;align-items:flex-start;margin:12px 0;font-weight:800;line-height:1.4}.check-row input{width:auto;margin-top:3px}.btn{display:inline-block;border:2px solid var(--blue);border-radius:4px;padding:13px 26px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none}.btn.primary{background:var(--blue);color:#fff}.btn.secondary{background:#fff;color:var(--blue)}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}.notice{display:none;margin:18px 0 0;padding:12px;border-radius:6px;font-weight:800;line-height:1.45}.notice.ok{display:block;background:#edf8f0;color:#147a32;border:1px solid #bfe8c8}.notice.err{display:block;background:#fff0f0;color:#b00020;border:1px solid #ffb8c0}.small{font-size:13px;color:#555;line-height:1.5}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.admin-table{width:100%;border-collapse:collapse;font-size:14px}.admin-table th,.admin-table td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.admin-table th{background:#f4f8ff;text-transform:uppercase;font-size:12px}.status-pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#f4f8ff;color:#003f9e;font-weight:900;font-size:12px;text-transform:uppercase}.password-wrap{position:relative}.password-wrap input{padding-right:86px}.password-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:#f4f8ff;color:var(--blue);font-weight:900;border-radius:5px;padding:7px 9px;cursor:pointer;text-transform:uppercase;font-size:12px}.password-toggle:hover{background:#e8f1ff}@media(max-width:720px){.grid{grid-template-columns:1fr}.menu{display:none}.wrap,.nav{padding-left:18px;padding-right:18px}.top-strip{display:none}}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ucejjztsbmrogiteivxl.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX";
const pstSupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
</script></head><body><div class="top-strip"><span>Research purposes only — not for human consumption</span><span>Support: support@pepshoptexas.com</span></div><header><nav class="nav"><a class="brand" href="index.html">P<span>S</span>T</a><div class="menu"><a href="index.html">Home</a><a href="register.html">Create Account</a><a href="login.html">Login</a><a href="account.html">My Account</a><a href="admin.html">Admin</a></div></nav></header><main class="wrap"><section class="auth-card"><h1 class="section-title">Create Account</h1><div class="underline"></div><p class="small">Create your Pep Shop Texas customer account. Products are listed for research purposes only.</p><form id="registerForm" class="grid"><div><label>First Name</label><input name="first_name" required></div><div><label>Last Name</label><input name="last_name" required></div><div><label>Email Address</label><input name="email" type="email" required></div><div><label>Phone Number</label><input name="phone" type="tel"></div><div><label>Username</label><input name="username" required></div><div><label for="password">Password</label><div class="password-wrap"><input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required><button class="password-toggle" type="button" data-toggle-password="password" aria-label="Show password">Show</button></div></div><div><label>Billing Address</label><input name="billing_address" required></div><div><label>Billing City</label><input name="billing_city" required></div><div><label>Billing State</label><input name="billing_state" required></div><div><label>Billing ZIP</label><input name="billing_zip" required></div><div class="full"><label class="check-row"><input type="checkbox" id="sameAsBilling" name="same_as_billing"> Shipping address is the same as billing address.</label></div><div><label>Shipping Address</label><input name="shipping_address" required></div><div><label>Shipping City</label><input name="shipping_city" required></div><div><label>Shipping State</label><input name="shipping_state" required></div><div><label>Shipping ZIP</label><input name="shipping_zip" required></div><div class="full"><label class="check-row"><input type="checkbox" name="age" required> I confirm I am at least 18 years old.</label><label class="check-row"><input type="checkbox" name="research" required> I understand products are sold for research purposes only and are not for human consumption.</label><label class="check-row"><input type="checkbox" name="tos" required> I agree to the Terms of Service.</label><label class="check-row"><input type="checkbox" name="marketing_opt_in" id="marketingOptIn"> I agree to receive Pep Shop Texas updates, promotions, and product availability emails. I understand I can unsubscribe at any time.</label></div><div class="full actions"><button class="btn primary" type="submit">Create Account</button><a class="btn secondary" href="login.html">Already have an account?</a></div></form><div id="notice" class="notice"></div></section></main><script>

function setupPasswordToggles(){
  document.querySelectorAll('[data-toggle-password]').forEach(function(btn){
    const input = document.getElementById(btn.getAttribute('data-toggle-password'));
    if (!input) return;
    btn.addEventListener('click', function(){
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });
  });
}
setupPasswordToggles();

function showNotice(id, message, type) {
  const el = document.getElementById(id);
  if (!el) { alert(message); return; }
  el.textContent = message;
  el.className = 'notice ' + (type === 'ok' ? 'ok' : 'err');
}

const registerForm = document.getElementById('registerForm');
const submitButton = registerForm.querySelector('button[type="submit"]');


const sameAsBillingCheckbox = document.getElementById('sameAsBilling');
const addressPairs = [
  ['billing_address', 'shipping_address'],
  ['billing_city', 'shipping_city'],
  ['billing_state', 'shipping_state'],
  ['billing_zip', 'shipping_zip']
];

function copyBillingToShipping() {
  if (!sameAsBillingCheckbox || !sameAsBillingCheckbox.checked) return;
  addressPairs.forEach(([billingName, shippingName]) => {
    const billingInput = registerForm.querySelector(`[name="${billingName}"]`);
    const shippingInput = registerForm.querySelector(`[name="${shippingName}"]`);
    if (billingInput && shippingInput) shippingInput.value = billingInput.value;
  });
}

if (sameAsBillingCheckbox) {
  sameAsBillingCheckbox.addEventListener('change', () => {
    copyBillingToShipping();
  });
  addressPairs.forEach(([billingName]) => {
    const billingInput = registerForm.querySelector(`[name="${billingName}"]`);
    if (billingInput) {
      billingInput.addEventListener('input', copyBillingToShipping);
      billingInput.addEventListener('change', copyBillingToShipping);
    }
  });
}

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  showNotice('notice', 'Creating account... please wait.', 'ok');
  submitButton.disabled = true;
  submitButton.textContent = 'Creating...';

  try {
    copyBillingToShipping();

    if (!window.supabase || !pstSupabaseClient) {
      throw new Error('Supabase did not load. Check the CDN script or internet connection.');
    }

    const f = new FormData(e.target);
    const email = String(f.get('email') || '').trim();
    const password = String(f.get('password') || '');

    const { data, error } = await pstSupabaseClient.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: 'https://www.pepshoptexas.com/login.html',
        data: {
          first_name: f.get('first_name'),
          last_name: f.get('last_name'),
          username: f.get('username')
        }
      }
    });

    if (error) {
      throw error;
    }

    const userId = data.user && data.user.id;
    if (userId) {
      const profile = {
        user_id: userId,
        first_name: f.get('first_name'),
        last_name: f.get('last_name'),
        email,
        phone: f.get('phone'),
        username: f.get('username'),
        billing_address: f.get('billing_address'),
        billing_city: f.get('billing_city'),
        billing_state: f.get('billing_state'),
        billing_zip: f.get('billing_zip'),
        shipping_address: f.get('shipping_address'),
        shipping_city: f.get('shipping_city'),
        shipping_state: f.get('shipping_state'),
        shipping_zip: f.get('shipping_zip'),
        account_status: 'active',
        age_confirmed: true,
        research_use_acknowledged: true,
        tos_accepted: true
      ,
        marketing_opt_in: f.get('marketing_opt_in') === 'on',
        marketing_opt_out: false,
        marketing_opt_in_at: f.get('marketing_opt_in') === 'on' ? new Date().toISOString() : null,
        marketing_source: f.get('marketing_opt_in') === 'on' ? 'registration' : null,};

      const { error: profileError } = await pstSupabaseClient
        .from('customer_profiles')
        .insert(profile);

      if (profileError) {
        throw new Error('Account was created, but profile save failed: ' + profileError.message);
      }
    }

    showNotice('notice', 'Account created. Check your email to verify your account, then log in.', 'ok');
    e.target.reset();
  } catch (err) {
    showNotice('notice', err.message || 'Something went wrong while creating the account.', 'err');
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = 'Create Account';
  }
});
</script></body></html>
