<script>

</script></head><body><header class="site-header compact-header"><a class="brand" href="index.html" aria-label="PEP Shop Texas home"><span class="brand-main">PEP SHOP</span><span class="brand-sub">TEXAS</span></a><nav class="main-nav" aria-label="Main navigation"><a href="catalog.html">PEPTIDES A-Z</a><a href="catalog.html?category=Stack">TOP STACKS</a><a href="faq.html">FAQ</a><a href="contact.html">CONTACT</a><a href="account.html">ACCOUNT</a><a href="admin.html" data-admin-link hidden>ADMIN</a><a class="cart-link" href="cart.html">CART <span data-cart-count>0</span></a></nav><form class="search" role="search" action="catalog.html" method="get"><input name="search" type="search" placeholder="Search peptides..." autocomplete="off"><button type="submit" aria-label="Search"><svg viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg></button></form></header><main class="wrap"><section class="auth-card"><h1 class="section-title">Create Account</h1><div class="underline"></div><p class="small">Create your Pep Shop Texas customer account. Products are listed for research purposes only.</p><form id="registerForm" class="grid"><div><label>First Name</label><input name="first_name" required></div><div><label>Last Name</label><input name="last_name" required></div><div><label>Email Address</label><input name="email" type="email" required></div><div><label>Phone Number</label><input name="phone" type="tel"></div><div><label>Username</label><input name="username" required></div><div><label for="password">Password</label><div class="password-wrap"><input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required><button class="password-toggle" type="button" data-toggle-password="password" aria-label="Show password">Show</button></div></div><div class="full"><label>Research Role / Organization Type</label><select name="research_role" required><option value="">Select one</option><option value="Independent Researcher">Independent Researcher</option><option value="Laboratory / Research Facility">Laboratory / Research Facility</option><option value="Healthcare / Medical Office">Healthcare / Medical Office</option><option value="Compounding / Formulation Business">Compounding / Formulation Business</option><option value="Academic / University Research">Academic / University Research</option><option value="Biotech / Pharmaceutical Research">Biotech / Pharmaceutical Research</option><option value="Other Research-Related Use">Other Research-Related Use</option></select></div><div><label>Billing Address</label><input name="billing_address" required></div><div><label>Billing City</label><input name="billing_city" required></div><div><label>Billing State</label><input name="billing_state" required></div><div><label>Billing ZIP</label><input name="billing_zip" required></div><div class="full"><label class="check-row"><input type="checkbox" id="sameAsBilling" name="same_as_billing"> Shipping address is the same as billing address.</label></div><div><label>Shipping Address</label><input name="shipping_address" required></div><div><label>Shipping City</label><input name="shipping_city" required></div><div><label>Shipping State</label><input name="shipping_state" required></div><div><label>Shipping ZIP</label><input name="shipping_zip" required></div><div class="full"><label class="check-row"><input type="checkbox" name="age" required> I confirm I am at least 18 years old.</label><label class="check-row"><input type="checkbox" name="research" required> I confirm that this account and any purchases are for research purposes only.</label><label class="check-row"><input type="checkbox" name="tos" required> I agree to the Terms of Service.</label><label class="check-row"><input type="checkbox" name="marketing_opt_in" id="marketingOptIn"> I agree to receive Pep Shop Texas updates, promotions, and product availability emails. I understand I can unsubscribe at any time.</label></div><div class="full actions"><button class="btn primary" type="submit">Create Account</button><a class="btn secondary" href="login.html">Already have an account?</a></div></form><div id="notice" class="notice"></div></section></main><script>

function setupPasswordToggles(){
  document.querySelectorAll('[data-toggle-password]').forEach(function(btn){
    const input = document.getElementById(btn.getAttribute('data-toggle-password'));
    if (!input) return;
    btn.addEventListener('click', function(){
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });
  });
}
setupPasswordToggles();

function showNotice(id, message, type) {
  const el = document.getElementById(id);
  if (!el) { alert(message); return; }
  el.textContent = message;
  el.className = 'notice ' + (type === 'ok' ? 'ok' : 'err');
}

const registerForm = document.getElementById('registerForm');
const submitButton = registerForm.querySelector('button[type="submit"]');


const sameAsBillingCheckbox = document.getElementById('sameAsBilling');
const addressPairs = [
  ['billing_address', 'shipping_address'],
  ['billing_city', 'shipping_city'],
  ['billing_state', 'shipping_state'],
  ['billing_zip', 'shipping_zip']
];

function copyBillingToShipping() {
  if (!sameAsBillingCheckbox || !sameAsBillingCheckbox.checked) return;
  addressPairs.forEach(([billingName, shippingName]) => {
    const billingInput = registerForm.querySelector(`[name="${billingName}"]`);
    const shippingInput = registerForm.querySelector(`[name="${shippingName}"]`);
    if (billingInput && shippingInput) shippingInput.value = billingInput.value;
  });
}

if (sameAsBillingCheckbox) {
  sameAsBillingCheckbox.addEventListener('change', () => {
    copyBillingToShipping();
  });
  addressPairs.forEach(([billingName]) => {
    const billingInput = registerForm.querySelector(`[name="${billingName}"]`);
    if (billingInput) {
      billingInput.addEventListener('input', copyBillingToShipping);
      billingInput.addEventListener('change', copyBillingToShipping);
    }
  });
}

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  showNotice('notice', 'Creating account... please wait.', 'ok');
  submitButton.disabled = true;
  submitButton.textContent = 'Creating...';

  try {
    copyBillingToShipping();

    if (!window.supabase || !pstSupabaseClient) {
      throw new Error('Supabase did not load. Check the CDN script or internet connection.');
    }

    const f = new FormData(e.target);
    const formValue = (name) => String(f.get(name) || '').trim();
    const email = formValue('email').toLowerCase();
    const password = String(f.get('password') || '');
    const marketingOptIn = f.get('marketing_opt_in') === 'on';

    const profileData = {
      first_name: formValue('first_name'),
      last_name: formValue('last_name'),
      email,
      phone: formValue('phone'),
      username: formValue('username'),
      research_role: formValue('research_role'),
      billing_address: formValue('billing_address'),
      billing_city: formValue('billing_city'),
      billing_state: formValue('billing_state'),
      billing_zip: formValue('billing_zip'),
      shipping_address: formValue('shipping_address'),
      shipping_city: formValue('shipping_city'),
      shipping_state: formValue('shipping_state'),
      shipping_zip: formValue('shipping_zip'),
      marketing_opt_in: marketingOptIn,
      marketing_opt_out: false,
      marketing_source: marketingOptIn ? 'registration' : null
    };

    const { error } = await pstSupabaseClient.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: 'https://www.pepshoptexas.com/login.html',
        data: profileData
      }
    });

    if (error) {
      throw error;
    }

    showNotice('notice', 'Account created. Check your email to confirm your account, then log in.', 'ok');
    e.target.reset();
  } catch (err) {
    showNotice('notice', err.message || 'Something went wrong while creating the account.', 'err');
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = 'Create Account';
  }
});
</script></body></html>
