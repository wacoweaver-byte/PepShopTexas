<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart | PEP Shop Texas</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#bd0000">
  <link rel="stylesheet" href="css/customer.css?v=24">
  <style>
    /* Cart visual refresh — presentation only; existing behavior remains unchanged. */
    :root {
      --cart-ink: #171717;
      --cart-muted: #666b73;
      --cart-line: #e4e6e9;
      --cart-soft: #fafafa;
      --cart-accent: #bd0000;
      --cart-radius: 0;
      --cart-shadow: none;
    }

    .cart-page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 46px 0 80px;
      color: var(--cart-ink);
    }

    .cart-page .page-heading {
      margin: 0 0 22px;
      padding: 0;
      text-align: left;
    }

    .cart-page .page-heading p {
      margin: 0 0 7px;
      color: var(--cart-accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .cart-page .page-heading h1 {
      margin: 0;
      font-size: clamp(30px, 3.5vw, 42px);
      line-height: 1.05;
      letter-spacing: -.035em;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(320px, .8fr);
      gap: 34px;
      align-items: start;
    }

    .cart-items,
    .cart-summary {
      box-sizing: border-box;
      min-width: 0;
      border: 1px solid var(--cart-line);
      border-radius: 0;
      background: #fff;
      box-shadow: none;
    }

    .cart-items {
      overflow: hidden;
    }

    .cart-summary {
      position: sticky;
      top: 24px;
      padding: 28px;
    }

    .cart-items table,
    .cart-summary table {
      width: 100%;
      border-collapse: collapse;
    }

    .cart-items th,
    .cart-summary th {
      padding: 14px 12px;
      border-bottom: 1px solid var(--cart-line);
      background: #fff;
      color: var(--cart-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .cart-items td,
    .cart-summary td {
      padding: 18px 12px;
      border-bottom: 1px solid var(--cart-line);
      vertical-align: middle;
    }

    .cart-summary h2,
    .cart-summary h3 {
      margin: 0 0 20px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .cart-summary hr {
      height: 1px;
      margin: 20px 0;
      border: 0;
      background: var(--cart-line);
    }

    .cart-summary button,
    .cart-summary .button,
    .cart-summary [class*="checkout"] {
      box-sizing: border-box;
      width: 100%;
      min-height: 48px;
      border-radius: 2px;
    }

    .cart-summary input,
    .cart-summary select {
      box-sizing: border-box;
      min-height: 44px;
      border-radius: 2px;
    }

    .cart-summary [class*="total"] {
      font-weight: 700;
    }

    .cart-summary [class*="grand"],
    .cart-summary [class*="final"] {
      color: var(--cart-accent);
      font-size: 1.2em;
    }

    /* Style the elements created dynamically by app.js. */
    .cart-items > article,
    .cart-items > .cart-item,
    .cart-items > [class*="cart-item"] {
      box-sizing: border-box;
      min-height: 0;
      padding: 26px 28px;
      border-bottom: 1px solid var(--cart-line);
    }

    .cart-items > :last-child {
      border-bottom: 0;
    }

    .cart-items .pst-cart-column-header,
    .cart-items .pst-cart-product-row {
      display: grid !important;
      grid-template-columns: 180px 68px 52px 88px 64px;
      gap: 6px;
      justify-content: start;
      align-items: center;
      width: 100%;
    }

    .cart-items .pst-cart-column-header {
      box-sizing: border-box;
      padding: 12px 22px;
      border-bottom: 1px solid var(--cart-line);
      background: var(--cart-soft);
      color: var(--cart-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .cart-items .pst-cart-column-header > span {
      min-width: 0;
      white-space: normal;
      line-height: 1.15;
    }

    .cart-items .pst-cart-column-header > span:first-child {
      text-align: left;
    }

    .cart-items .pst-cart-column-header > span:not(:first-child) {
      width: 100%;
      justify-self: center;
      text-align: center;
    }

    .cart-items .pst-cart-column-header > span:nth-child(2),
    .cart-items .pst-cart-column-header > span:nth-child(4) {
      max-width: 64px;
    }

    .cart-items .pst-cart-product-row {
      box-sizing: border-box;
      padding: 17px 22px;
      border-bottom: 1px solid var(--cart-line);
    }

    .cart-items .pst-cart-product-row:last-child {
      border-bottom: 0;
    }

    .cart-items .pst-cart-controls-contents {
      display: contents !important;
    }

    .cart-items .pst-cart-product,
    .cart-items .pst-cart-unit-price,
    .cart-items .pst-cart-extended-price,
    .cart-items .pst-cart-remove {
      margin: 0 !important;
    }

    .cart-items .pst-cart-product-cell {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
    }

    .cart-items .pst-cart-product {
      grid-column: 1;
      grid-row: 1;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .cart-items .pst-cart-unit-price,
    .cart-items .pst-cart-extended-price {
      font-size: 14px;
      white-space: nowrap;
    }

    .cart-items .pst-cart-unit-price {
      grid-column: 2;
      grid-row: 1;
      justify-self: center;
      text-align: center;
    }

    .cart-items .pst-cart-extended-price {
      grid-column: 4;
      grid-row: 1;
      justify-self: center;
      text-align: center;
      font-weight: 700;
    }

    .cart-items .pst-cart-qty {
      grid-column: 3;
      grid-row: 1;
      justify-self: center;
      text-align: center;
      width: 58px !important;
      height: 36px !important;
      min-height: 36px !important;
      padding: 6px 8px !important;
      font-size: 14px !important;
      margin: 0 !important;
    }

    .cart-items .pst-cart-remove {
      grid-column: 5;
      grid-row: 1;
      justify-self: center;
      width: auto !important;
      min-height: 32px !important;
      padding: 5px 12px !important;
      border: 1px solid #000 !important;
      border-radius: 999px !important;
      background: #fff !important;
      color: #000 !important;
      font-size: 13px !important;
      font-weight: 600;
      line-height: 1;
    }

    .cart-items .pst-cart-remove:hover {
      border-color: #000 !important;
      background: #000 !important;
      color: #fff !important;
    }

    .cart-items h2,
    .cart-items h3,
    .cart-items [class*="name"] {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .cart-items p {
      margin: 0 0 18px;
      color: var(--cart-muted);
    }

    .cart-items input[type="number"] {
      box-sizing: border-box;
      width: 70px;
      height: 42px;
      margin: 0 8px 0 0;
      padding: 8px 10px;
      border: 1px solid #aeb2b8;
      border-radius: 2px;
      background: #fff;
      font: inherit;
      vertical-align: middle;
    }

    .cart-items button {
      min-height: 42px;
      padding: 8px 15px;
      border: 1px solid #292929;
      border-radius: 2px;
      background: #fff;
      color: #171717;
      font: inherit;
      cursor: pointer;
      vertical-align: middle;
    }

    .cart-items button:hover {
      background: #171717;
      color: #fff;
    }

    .cart-items strong,
    .cart-items [class*="price"] {
      margin-right: 10px;
    }

    .cart-summary > div,
    .cart-summary [class*="summary-row"],
    .cart-summary [class*="total-row"],
    .cart-summary [class*="subtotal"],
    .cart-summary [class*="shipping"],
    .cart-summary [class*="tax"] {
      box-sizing: border-box;
    }

    .cart-summary [class*="summary-row"],
    .cart-summary [class*="total-row"],
    .cart-summary [class*="subtotal"],
    .cart-summary [class*="shipping"],
    .cart-summary [class*="tax"] {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      width: 100%;
      margin: 0;
      padding: 5px 0;
    }

    .cart-summary .pst-summary-money-row {
      display: grid !important;
      grid-template-columns: minmax(0, 1fr) 7.5ch !important;
      align-items: baseline;
      column-gap: 8px !important;
      width: 100%;
      padding: 5px 0;
      font-size: 15px;
      line-height: 1.25;
    }

    .cart-summary .pst-summary-money-row > :last-child {
      grid-column: 2;
      width: 7.5ch;
      margin: 0;
      justify-self: end;
      text-align: right !important;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .cart-summary .pst-summary-amount {
      grid-column: 2 !important;
      width: 7.5ch !important;
      margin: 0 !important;
      justify-self: end !important;
      text-align: right !important;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .cart-summary .pst-summary-total-row {
      margin-top: 7px;
      padding-top: 13px;
      border-top: 1px solid var(--cart-line);
      font-size: 16px;
      font-weight: 700;
    }

    .cart-summary [class*="summary-row"] > :last-child,
    .cart-summary [class*="total-row"] > :last-child,
    .cart-summary [class*="subtotal"] > :last-child,
    .cart-summary [class*="shipping"] > :last-child,
    .cart-summary [class*="tax"] > :last-child {
      margin-left: auto;
      text-align: right;
      white-space: nowrap;
    }

    .cart-summary p {
      margin: 18px 0 0;
      color: #3f4247;
      font-size: 15px;
      line-height: 1.55;
    }

    .cart-summary [data-payment-qr]:empty {
      display: none !important;
      min-height: 0 !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .cart-summary .payment-instructions + [data-payment-qr]:empty + .checkout-note {
      margin-top: 14px !important;
    }

    .cart-summary .checkout-form {
      display: flex !important;
      flex-direction: column !important;
      gap: 0 !important;
    }

    .cart-summary .checkout-form > label:has(> select[name="payment_method"]) {
      margin-bottom: 0 !important;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--cart-line);
    }

    .cart-summary .checkout-form .payment-instructions {
      margin: 14px 0 0 !important;
      min-height: 0 !important;
      height: auto !important;
      padding: 0 !important;
    }

    .cart-summary .checkout-form > [data-payment-qr]:not(:has(img)) {
      display: none !important;
      min-height: 0 !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .cart-summary .checkout-form .payment-instructions + [data-payment-qr] + .checkout-note {
      margin: 14px 0 0 !important;
    }

    .cart-summary .checkout-form > label:has(> textarea[name="customer_notes"]) {
      display: block !important;
      margin: 16px 0 0 !important;
    }

    .cart-summary .checkout-form textarea[name="customer_notes"] {
      display: block;
      box-sizing: border-box;
      width: 100%;
      min-height: 58px;
      margin-top: 7px;
    }

    .cart-summary .checkout-form > button[type="submit"] {
      margin-top: 16px !important;
    }

    .cart-summary .checkout-form > .checkout-status:empty {
      display: none !important;
      margin: 0 !important;
    }

    .cart-summary label {
      display: block;
      margin: 22px 0 7px;
      color: #3f4247;
      font-size: 14px;
      font-weight: 600;
    }

    .cart-summary select,
    .cart-summary input:not([type="checkbox"]):not([type="radio"]) {
      width: 100%;
      min-height: 46px;
      padding: 9px 12px;
      border: 1px solid #aeb2b8;
      background: #fff;
      font: inherit;
    }

    .cart-summary button,
    .cart-summary .button {
      margin-top: 18px;
      padding: 11px 18px;
      border: 1px solid var(--cart-accent);
      background: var(--cart-accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .cart-summary button:hover,
    .cart-summary .button:hover {
      border-color: #930000;
      background: #930000;
    }

    @media (max-width: 820px) {
      .cart-page {
        width: min(100% - 24px, 680px);
        padding: 34px 0 56px;
      }

      .cart-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .cart-summary {
        position: static;
      }

      .cart-items .pst-cart-column-header {
        display: none !important;
      }

      .cart-items .pst-cart-product-row {
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
      }

      .cart-items .pst-cart-product {
        grid-column: 1 / -1;
        grid-row: auto;
      }

      .cart-items .pst-cart-product-cell {
        grid-column: 1 / -1;
        grid-row: auto;
      }

      .cart-items .pst-cart-unit-price,
      .cart-items .pst-cart-qty,
      .cart-items .pst-cart-extended-price,
      .cart-items .pst-cart-remove {
        grid-column: auto;
        grid-row: auto;
      }

      .cart-items .pst-cart-unit-price::before {
        content: "Unit: ";
        color: var(--cart-muted);
        font-weight: 400;
      }

      .cart-items .pst-cart-extended-price::before {
        content: "Total: ";
        color: var(--cart-muted);
        font-weight: 400;
      }
    }

    @media (max-width: 520px) {
      .cart-page {
        width: min(100% - 20px, 480px);
      }

      .cart-summary {
        padding: 20px 16px;
      }

      .cart-items th,
      .cart-items td,
      .cart-summary th,
      .cart-summary td {
        padding-right: 10px;
        padding-left: 10px;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js?v=49"></script>
  <script defer src="cart-payment-discounts.js?v=1"></script>
  <script defer src="cart-store-credit-auto.js?v=1"></script>
</head>
<body data-page="cart">
  <header class="pst-customer-header">
    <div class="pst-customer-header-inner">
      <a class="pst-customer-logo-link" href="index.html" aria-label="Pep Shop Texas home"><img src="customer facing header logo.png" alt="PST Pep Shop Texas" class="pst-customer-header-logo"></a>
      <div class="pst-customer-header-right">
        <form class="pst-customer-search" role="search" action="catalog.html" method="get" data-product-search-form>
          <label class="sr-only" for="pst-customer-search-input">Search peptides</label>
          <input id="pst-customer-search-input" name="search" type="search" placeholder="Search peptides..." autocomplete="off">
          <button type="submit" aria-label="Search"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path></svg></button>
        </form>
        <nav class="pst-customer-nav main-nav" aria-label="Main navigation">
          <a href="catalog.html">PEPTIDES A-Z <span aria-hidden="true">⌄</span></a>
          <a href="catalog.html?category=Stack">TOP STACKS <span aria-hidden="true">⌄</span></a>
          <a href="faq.html">FAQ</a><a href="contact.html">CONTACT</a><a href="account.html" data-account-link>LOGIN</a>
          <a class="cart-link" href="cart.html">CART <span class="pst-cart-count" data-cart-count>0</span></a>
        </nav>
      </div>
    </div>
  </header>
  <main class="cart-page">
    <section class="page-heading"><p>Shopping cart</p><h1>Your Cart</h1></section>
    <section class="cart-layout">
      <div class="cart-main-column">
        <div class="cart-items" data-cart-items></div>
        <section class="new-shipping-address-host" data-new-shipping-address-host hidden>
          <h2>New Shipping Address</h2>
        </section>
      </div>
      <aside class="cart-summary" data-cart-summary></aside>
    </section>
  </main>
  <footer class="site-footer"><div class="site-footer-inner"><div class="site-footer-brand"><strong>Pep Shop Texas</strong><span>Research-use catalog. Not for human or veterinary use.</span></div><nav class="site-footer-links" aria-label="Footer policies"><a href="terms.html">Terms</a><a href="privacy.html">Privacy</a><a href="shipping.html">Shipping</a><a href="returns.html">Returns</a><a href="contact.html">Contact</a></nav></div></footer>
  <script>
    /* Presentation-only hooks for the order-total rows rendered by app.js. */
    (() => {
      const summary = document.querySelector('[data-cart-summary]');
      if (!summary) return;

      const markMoneyRows = () => {
        summary.querySelectorAll('div, p, li').forEach((element) => {
          const text = (element.textContent || '').replace(/\s+/g, ' ').trim();
          if (text.length > 80 || element.children.length > 3) return;
          if (/^(Subtotal|Shipping|Tax\b|Estimated Tax\b|Total\b|Grand Total\b)/i.test(text)) {
            element.classList.add('pst-summary-money-row');
            const amount = [...element.querySelectorAll('span, strong, b, em')]
              .reverse()
              .find((candidate) => /^\$\s*[\d,]+\.\d{2}$/.test((candidate.textContent || '').trim()));
            if (amount) amount.classList.add('pst-summary-amount');
            if (/^(Total\b|Grand Total\b)/i.test(text)) {
              element.classList.add('pst-summary-total-row');
            }
          }
        });
      };

      markMoneyRows();
      new MutationObserver(markMoneyRows).observe(summary, { childList: true, subtree: true });
    })();
  </script>
  <script>
    /* Presentation-only column layout for cart items rendered by app.js. */
    (() => {
      const cartItems = document.querySelector('[data-cart-items]');
      if (!cartItems) return;

      const formatRows = () => {
        const removeButtons = [...cartItems.querySelectorAll('button')]
          .filter((button) => /remove/i.test(button.textContent || ''));

        if (!removeButtons.length) return;

        if (!cartItems.querySelector('.pst-cart-column-header')) {
          const header = document.createElement('div');
          header.className = 'pst-cart-column-header';
          header.setAttribute('aria-hidden', 'true');
          header.innerHTML = '<span>Product</span><span>Unit<br>Price</span><span>Qty</span><span>Extended<br>Price</span><span>Remove</span>';
          cartItems.prepend(header);
        }

        removeButtons.forEach((removeButton) => {
          let row = removeButton.parentElement;
          while (row && row.parentElement !== cartItems) row = row.parentElement;
          if (!row || row === cartItems) return;

          row.classList.add('pst-cart-product-row');

          if (row.dataset.pstCartFormatted === '1') return;

          const product = row.querySelector('h1, h2, h3, h4, [class*="name"]');
          const qty = row.querySelector('input[type="number"], select[class*="qty"], select[class*="quantity"]');
          const priceCandidates = [...row.querySelectorAll('p, strong, [class*="price"]')]
            .filter((element) => /\$\s*\d/.test(element.textContent || '') && !element.contains(qty));

          if (product) product.classList.add('pst-cart-product');
          if (qty) qty.classList.add('pst-cart-qty');
          if (product && product.parentElement !== row) product.parentElement.classList.add('pst-cart-product-cell');
          if (priceCandidates[0]) {
            priceCandidates[0].classList.add('pst-cart-unit-price');
            if (priceCandidates[0].parentElement !== row) row.appendChild(priceCandidates[0]);
          }
          if (priceCandidates[1]) priceCandidates[1].classList.add('pst-cart-extended-price');
          removeButton.classList.add('pst-cart-remove');

          if (qty) {
            let controls = qty.parentElement;
            while (controls && controls !== row && !controls.contains(removeButton)) {
              controls = controls.parentElement;
            }
            if (controls && controls !== row) controls.classList.add('pst-cart-controls-contents');
          }

          row.dataset.pstCartFormatted = '1';
        });
      };

      formatRows();
      new MutationObserver(formatRows).observe(cartItems, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
