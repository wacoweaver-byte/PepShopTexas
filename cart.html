<style id="pst-cart-page-actions-compact-pill-style-v3">
/* PST Cart page compact pill style - corrected
   Header untouched.
   Product-name links inside cart rows stay normal text links.
   Only cart page action controls/buttons/status pills are styled. */
:root {
  --pst-cart-pill-h: 26px;
  --pst-cart-pill-font: 10px;
  --pst-cart-pill-weight: 700;
  --pst-cart-pill-radius: 999px;
  --pst-cart-pill-pad-x: 10px;
  --pst-cart-pill-line: #c9ced6;
  --pst-cart-pill-ink: #101820;
  --pst-cart-pill-blue: #003f9e;
  --pst-cart-pill-red: #bd0000;
  --pst-cart-pill-green: #0c6b3a;
  --pst-cart-pill-warn: #8a5a00;
  --pst-cart-pill-danger: #8a1f17;
}

/* Page-body cart actions only. Do not target .site-header, .main-nav, .search, header cart link, footer nav, or product title links. */
.cart-page button,
.cart-page .btn,
.cart-page a.btn,
.cart-page .primary-action,
.cart-page .secondary-action,
.cart-page .checkout-btn,
.cart-page .checkout-button,
.cart-page [data-checkout],
.cart-page [data-cart-checkout],
.cart-page .cart-remove-button,
.cart-page [data-remove-cart],
.cart-page .remove-item,
.cart-page .cart-remove,
.cart-page .cart-item-remove,
.cart-page .discount-code button,
.cart-page .discount-row button,
.cart-page .promo-code button,
.cart-page .coupon-code button,
.cart-page .pill,
.cart-page .badge,
.cart-page .status-pill,
.cart-page .cart-status-pill,
.cart-page .cart-tag,
.cart-page .shipping-pill,
.cart-page .free-shipping-pill {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  box-sizing: border-box !important;
  flex: 0 0 auto !important;
  width: auto !important;
  min-width: 0 !important;
  max-width: max-content !important;
  min-height: var(--pst-cart-pill-h) !important;
  height: var(--pst-cart-pill-h) !important;
  margin: 0 !important;
  padding: 0 var(--pst-cart-pill-pad-x) !important;
  border: 1px solid currentColor !important;
  border-radius: var(--pst-cart-pill-radius) !important;
  background: #ffffff !important;
  color: var(--pst-cart-pill-ink) !important;
  font-family: Arial, Helvetica, sans-serif !important;
  font-size: var(--pst-cart-pill-font) !important;
  font-weight: var(--pst-cart-pill-weight) !important;
  line-height: 1 !important;
  letter-spacing: 0 !important;
  text-align: center !important;
  text-transform: none !important;
  text-decoration: none !important;
  white-space: nowrap !important;
  vertical-align: middle !important;
  box-shadow: none !important;
}

/* Product links stay normal, not pills. */
.cart-page .cart-row h2 a,
.cart-page [data-cart-items] .cart-row h2 a {
  display: inline !important;
  min-height: 0 !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  color: inherit !important;
  font: inherit !important;
  line-height: inherit !important;
  text-decoration: none !important;
  box-shadow: none !important;
  white-space: normal !important;
}

/* Default cart actions: compact blue-outline pill. */
.cart-page button,
.cart-page .btn,
.cart-page a.btn,
.cart-page .primary-action,
.cart-page .secondary-action,
.cart-page .discount-code button,
.cart-page .discount-row button,
.cart-page .promo-code button,
.cart-page .coupon-code button {
  color: var(--pst-cart-pill-blue) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-blue) !important;
  cursor: pointer !important;
}

/* Checkout/submit action: compact green-outline pill. */
.cart-page .checkout-btn,
.cart-page .checkout-button,
.cart-page [data-checkout],
.cart-page [data-cart-checkout],
.cart-page button[type="submit"],
.cart-page button.primary,
.cart-page .btn.primary,
.cart-page button.checkout,
.cart-page .btn.checkout {
  color: var(--pst-cart-pill-green) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-green) !important;
}

/* Remove/delete actions: compact red-outline pill. */
.cart-page .cart-remove-button,
.cart-page [data-remove-cart],
.cart-page .remove-item,
.cart-page .cart-remove,
.cart-page .cart-item-remove,
.cart-page button.remove,
.cart-page button.delete,
.cart-page .btn.danger,
.cart-page button.danger {
  color: var(--pst-cart-pill-danger) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-danger) !important;
}

/* Cart badges/statuses. */
.cart-page .pill.good,
.cart-page .badge.good,
.cart-page .status-pill.good,
.cart-page .cart-status-pill.good,
.cart-page .free-shipping-pill,
.cart-page .in-stock,
.cart-page .available {
  color: var(--pst-cart-pill-green) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-green) !important;
  cursor: default !important;
}

.cart-page .pill.warn,
.cart-page .badge.warn,
.cart-page .status-pill.warn,
.cart-page .cart-status-pill.warn,
.cart-page .shipping-pill,
.cart-page .limited {
  color: var(--pst-cart-pill-warn) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-warn) !important;
  cursor: default !important;
}

.cart-page .pill.bad,
.cart-page .badge.bad,
.cart-page .pill.danger,
.cart-page .badge.danger,
.cart-page .status-pill.bad,
.cart-page .cart-status-pill.bad,
.cart-page .out-of-stock,
.cart-page .unavailable {
  color: var(--pst-cart-pill-danger) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-danger) !important;
  cursor: default !important;
}

.cart-page .pill.info,
.cart-page .badge.info,
.cart-page .cart-tag {
  color: var(--pst-cart-pill-blue) !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-blue) !important;
  cursor: default !important;
}

/* Disabled state matches compact grey Out style. */
.cart-page button:disabled,
.cart-page .btn:disabled,
.cart-page button[aria-disabled="true"],
.cart-page .btn[aria-disabled="true"],
.cart-page a[aria-disabled="true"],
.cart-page .disabled {
  color: #6f7680 !important;
  background: #ffffff !important;
  border-color: var(--pst-cart-pill-line) !important;
  opacity: 1 !important;
  cursor: not-allowed !important;
  pointer-events: none !important;
}

/* Keep cart button groups compact. */
.cart-page .cart-actions,
.cart-page .cart-summary-actions,
.cart-page .discount-code,
.cart-page .discount-row,
.cart-page .promo-code,
.cart-page .coupon-code {
  gap: 6px !important;
}

/* Cart message text remains message text, not buttons. */
.cart-page .checkout-note,
.cart-page .checkout-status,
.cart-page .cart-message,
.cart-page .cart-note,
.cart-page .free-shipping-message,
.cart-page .shipping-message,
.cart-page .discount-message {
  font-family: Arial, Helvetica, sans-serif !important;
  font-size: 13px !important;
  font-weight: 400 !important;
  line-height: 1.35 !important;
}

/* Mobile: preserve compact pill sizing. */
@media (max-width: 700px) {
  .cart-page button,
  .cart-page .btn,
  .cart-page a.btn,
  .cart-page .primary-action,
  .cart-page .secondary-action,
  .cart-page .checkout-btn,
  .cart-page .checkout-button,
  .cart-page [data-checkout],
  .cart-page [data-cart-checkout],
  .cart-page .cart-remove-button,
  .cart-page [data-remove-cart],
  .cart-page .remove-item,
  .cart-page .cart-remove,
  .cart-page .cart-item-remove,
  .cart-page .discount-code button,
  .cart-page .discount-row button,
  .cart-page .promo-code button,
  .cart-page .coupon-code button,
  .cart-page .pill,
  .cart-page .badge,
  .cart-page .status-pill,
  .cart-page .cart-status-pill,
  .cart-page .cart-tag,
  .cart-page .shipping-pill,
  .cart-page .free-shipping-pill {
    min-height: 25px !important;
    height: 25px !important;
    padding: 0 9px !important;
    font-size: 9.5px !important;
  }
}

@media (max-width: 390px) {
  .cart-page button,
  .cart-page .btn,
  .cart-page a.btn,
  .cart-page .primary-action,
  .cart-page .secondary-action,
  .cart-page .checkout-btn,
  .cart-page .checkout-button,
  .cart-page [data-checkout],
  .cart-page [data-cart-checkout],
  .cart-page .cart-remove-button,
  .cart-page [data-remove-cart],
  .cart-page .remove-item,
  .cart-page .cart-remove,
  .cart-page .cart-item-remove,
  .cart-page .discount-code button,
  .cart-page .discount-row button,
  .cart-page .promo-code button,
  .cart-page .coupon-code button,
  .cart-page .pill,
  .cart-page .badge,
  .cart-page .status-pill,
  .cart-page .cart-status-pill,
  .cart-page .cart-tag,
  .cart-page .shipping-pill,
  .cart-page .free-shipping-pill {
    min-height: 24px !important;
    height: 24px !important;
    padding: 0 8px !important;
    font-size: 9px !important;
  }
}
</style>
