<body>
  <header class="pst-customer-header"><div class="pst-customer-header-inner"><a class="pst-customer-logo-link" href="index.html" aria-label="Pep Shop Texas home"><img src="customer facing header logo.png" alt="PST Pep Shop Texas" class="pst-customer-header-logo"></a><div class="pst-customer-header-right"><form class="pst-customer-search" role="search" action="catalog.html" method="get"><label class="sr-only" for="pst-customer-search-input">Search peptides</label><input id="pst-customer-search-input" name="search" type="search" placeholder="Search peptides..." autocomplete="off"><button type="submit" aria-label="Search"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path></svg></button></form><nav class="pst-customer-nav main-nav" aria-label="Main navigation"><a href="catalog.html">PEPTIDES A-Z <span aria-hidden="true">⌄</span></a><a href="catalog.html?category=Stack">TOP STACKS <span aria-hidden="true">⌄</span></a><a href="faq.html">FAQ</a><a href="contact.html">CONTACT</a><a href="account.html" data-account-link>LOGIN</a><a href="cart.html">CART <span class="pst-cart-count" data-cart-count>0</span></a></nav></div></div></header>
  <main class="wrap"><section class="auth-card"><h1 class="section-title">Change Password</h1><div class="underline"></div><p class="small">Use this page when you are already logged in and know your current password.</p><form id="changePasswordForm" hidden><label for="currentPassword">Current Password</label><div class="password-wrap"><input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required><button class="password-toggle" type="button" data-toggle-password="currentPassword" aria-label="Show password">Show</button></div><label for="newPassword">New Password</label><div class="password-wrap"><input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required minlength="10"><button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Show password">Show</button></div><label for="confirmPassword">Confirm New Password</label><div class="password-wrap"><input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required minlength="10"><button class="password-toggle" type="button" data-toggle-password="confirmPassword" aria-label="Show password">Show</button></div><div class="actions"><button id="changePasswordBtn" class="btn primary" type="submit">Change Password</button><a class="btn secondary" href="account.html">Back to My Account</a><a class="btn secondary" href="forgot-password.html">Forgot Password</a></div></form><div id="notice" class="notice info">Checking login status...</div><div class="help-box">If you do not know your current password, use Forgot Password instead.</div></section></main>
  <script>
const SUPABASE_URL="https://ucejjztsbmrogiteivxl.supabase.co";
const SUPABASE_PUBLISHABLE_KEY="sb_publishable_ZZweuz4h3PMhOGrs0hBpiA_jruqk4dX";
const pstSupabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
function showNotice(message,type="info"){const el=document.getElementById("notice");if(!el)return;el.textContent=message;el.className="notice "+type;}
function setupPasswordToggles(){document.querySelectorAll("[data-toggle-password]").forEach(function(btn){const input=document.getElementById(btn.getAttribute("data-toggle-password"));if(!input)return;btn.addEventListener("click",function(){const show=input.type==="password";input.type=show?"text":"password";btn.textContent=show?"Hide":"Show";btn.setAttribute("aria-label",show?"Hide password":"Show password");});});}
setupPasswordToggles();
let activeUser=null;
async function checkLogin(){const {data,error}=await pstSupabaseClient.auth.getSession();if(error||!data||!data.session||!data.session.user){showNotice("You must be logged in to change your password. Redirecting to login...","err");setTimeout(function(){window.location.href="login.html?return=change-password.html";},900);return;}activeUser=data.session.user;document.getElementById("changePasswordForm").hidden=false;showNotice("Logged in as "+(activeUser.email||"your account")+".","ok");}
checkLogin();
document.getElementById("changePasswordForm").addEventListener("submit",async function(event){event.preventDefault();if(!activeUser||!activeUser.email){showNotice("Login session not found. Please log in again.","err");return;}const currentPassword=document.getElementById("currentPassword").value;const newPassword=document.getElementById("newPassword").value;const confirmPassword=document.getElementById("confirmPassword").value;const btn=document.getElementById("changePasswordBtn");if(newPassword.length<10){showNotice("New password must be at least 10 characters.","err");return;}if(newPassword!==confirmPassword){showNotice("New passwords do not match.","err");return;}if(currentPassword===newPassword){showNotice("New password must be different from your current password.","err");return;}btn.disabled=true;btn.textContent="Changing...";showNotice("Verifying current password...","info");try{const verify=await pstSupabaseClient.auth.signInWithPassword({email:activeUser.email,password:currentPassword});if(verify.error)throw new Error("Current password is incorrect.");showNotice("Current password verified. Saving new password...","info");const update=await pstSupabaseClient.auth.updateUser({password:newPassword});if(update.error)throw update.error;document.getElementById("changePasswordForm").reset();showNotice("Password changed successfully.","ok");}catch(err){showNotice("Password could not be changed: "+(err.message||err),"err");}finally{btn.disabled=false;btn.textContent="Change Password";}});
  </script>
</body>
</html>
